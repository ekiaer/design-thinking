        if (dAns[2]) custText.push([{ text: "What they value: ", options: { bold: true, fontSize: 13, fontFace: "Arial", color: GOLD } }, { text: dAns[2].substring(0, 300), options: { fontSize: 13, fontFace: "Arial", color: CREAM } }]);
        if (dSyn && dSyn.synthesis) custText.push([{ text: "Insight: ", options: { bold: true, fontSize: 13, fontFace: "Arial", color: GOLD } }, { text: dSyn.synthesis.substring(0, 400), options: { fontSize: 13, fontFace: "Arial", color: CREAM, italic: true } }]);
        if (custText.length > 0) {
          s3.addText(custText, { x: 0.6, y: 1.3, w: 11.8, h: 5.2, valign: "top", lineSpacingMultiple: 1.8, paraSpaceAfter: 12 });
        }
        s3.notes = "Describe the specific person you designed for. What do they currently do? What did you learn about what they actually value?";

        // ── SLIDE 4: What We Tested ──
        var s4 = addSlide();
        slideTitle(s4, "What We Tested");
        var fAns = S.dimensions.feasibility.answers;
        var fSyn = S.dimensions.feasibility.synthesis;
        var testText = [];
        if (fAns[0]) testText.push([{ text: "Experiment: ", options: { bold: true, fontSize: 13, fontFace: "Arial", color: GOLD } }, { text: fAns[0].substring(0, 300), options: { fontSize: 13, fontFace: "Arial", color: CREAM } }]);
        if (fAns[1]) testText.push([{ text: "Prediction: ", options: { bold: true, fontSize: 13, fontFace: "Arial", color: GOLD } }, { text: fAns[1].substring(0, 300), options: { fontSize: 13, fontFace: "Arial", color: CREAM } }]);
        if (fAns[2]) testText.push([{ text: "What happened: ", options: { bold: true, fontSize: 13, fontFace: "Arial", color: GOLD } }, { text: fAns[2].substring(0, 300), options: { fontSize: 13, fontFace: "Arial", color: CREAM } }]);
        if (fSyn && fSyn.maturity) testText.push([{ text: "Maturity: ", options: { bold: true, fontSize: 13, fontFace: "Arial", color: GOLD } }, { text: fSyn.maturity, options: { fontSize: 13, fontFace: "Arial", color: fSyn.maturity === "Concept" ? RED : fSyn.maturity === "Validated direction" ? GREEN : GOLD } }]);
        if (testText.length > 0) {
          s4.addText(testText, { x: 0.6, y: 1.3, w: 11.8, h: 5.2, valign: "top", lineSpacingMultiple: 1.8, paraSpaceAfter: 12 });
        }
        s4.notes = "Walk through your experiment: what you predicted, what happened, and what you learned. Honest failure is strong evidence.";

        // ── SLIDE 5: The Economics ──
        var s5 = addSlide();
        slideTitle(s5, "The Economics");
        var vSyn = S.dimensions.viability.synthesis;
        var econText = [];
        if (b.viability && b.viability.economics) econText.push([{ text: b.viability.economics.substring(0, 500), options: { fontSize: 13, fontFace: "Arial", color: CREAM } }]);
        if (vSyn && vSyn.tam_sam) {
          econText.push([{ text: "Market size: ", options: { bold: true, fontSize: 13, fontFace: "Arial", color: GOLD } }, { text: vSyn.tam_sam.description.substring(0, 300), options: { fontSize: 13, fontFace: "Arial", color: CREAM } }]);
          if (vSyn.tam_sam.year_one) econText.push([{ text: "Year one: ", options: { bold: true, fontSize: 13, fontFace: "Arial", color: GOLD } }, { text: vSyn.tam_sam.year_one, options: { fontSize: 13, fontFace: "Arial", color: CREAM } }]);
        }
        if (b.viability && b.viability.retention) econText.push([{ text: "Retention: ", options: { bold: true, fontSize: 13, fontFace: "Arial", color: GOLD } }, { text: b.viability.retention.substring(0, 300), options: { fontSize: 13, fontFace: "Arial", color: CREAM } }]);
        if (econText.length > 0) {
          s5.addText(econText, { x: 0.6, y: 1.3, w: 11.8, h: 5.2, valign: "top", lineSpacingMultiple: 1.6, paraSpaceAfter: 10 });
        }
        s5.notes = "Present your unit economics, market size, and retention logic. If you have LTV:CAC ratio, lead with that.";

        // ── SLIDE 6: Our Assessment ──
        var s6 = addSlide();
        slideTitle(s6, "Our Assessment");
        var ratingLabels = { 1: "Significant limitations", 2: "Manageable limitations", 3: "Unique advantage" };
        var ratingColors = { 1: RED, 2: GOLD, 3: GREEN };
        var yPos = 1.5;
        DIM_ORDER.forEach(function(dim) {
          var d = S.dimensions[dim];
          var r = d.rating;
          // Dimension label
          s6.addText(DIMS[dim].label.toUpperCase(), {
            x: 0.6, y: yPos, w: 3, h: 0.4,
            fontSize: 11, fontFace: "Arial", color: MUTED, letterSpacing: 2, bold: true
          });
          // Rating dots + label
          s6.addText(ratingDots(r) + "  " + ratingLabels[r], {
            x: 3.8, y: yPos, w: 4, h: 0.4,
            fontSize: 14, fontFace: "Arial", color: ratingColors[r], bold: true
          });
          // Evidence from follow-ups
          var evidence = d.followUpAnswers[0] || "";
          if (evidence) {
            s6.addText(evidence.substring(0, 250), {
              x: 0.6, y: yPos + 0.45, w: 11.8, h: 0.9,
              fontSize: 11, fontFace: "Arial", color: MUTED, italic: true, lineSpacingMultiple: 1.4, valign: "top"
            });
          }
          yPos += evidence ? 1.6 : 0.8;
        });
        s6.notes = "This is the centerpiece. Walk through each dimension: your rating, and the evidence behind it. Be honest about limitations.";

        // ── SLIDE 7: Certainty & Uncertainty ──
        var s7 = addSlide();
        slideTitle(s7, "What We\u2019re Certain and Uncertain About");
        // Average confidence
        s7.addText(avg + "%", { x: 0.6, y: 1.3, w: 3, h: 0.8, fontSize: 36, fontFace: "Arial", color: GOLD, bold: true });
        s7.addText("average confidence across " + allA.length + " assumptions", { x: 0.6, y: 2.0, w: 5, h: 0.4, fontSize: 11, fontFace: "Arial", color: MUTED });

        var highConf = allA.filter(function(a) { return a.certainty >= 60; });
        var lowConf = allA.filter(function(a) { return a.certainty < 60; });

        var aY = 2.7;
        if (highConf.length > 0) {
          s7.addText("HIGHER CONFIDENCE", { x: 0.6, y: aY, w: 5, h: 0.3, fontSize: 9, fontFace: "Arial", color: GREEN, letterSpacing: 2, bold: true });
          aY += 0.35;
          highConf.forEach(function(a) {
            s7.addText(a.certainty + "%  " + a.text, { x: 0.6, y: aY, w: 6, h: 0.35, fontSize: 11, fontFace: "Arial", color: CREAM });
            s7.addText(DIMS[a.dim].label, { x: 6.8, y: aY, w: 2, h: 0.35, fontSize: 9, fontFace: "Arial", color: MUTED, italic: true });
            aY += 0.4;
          });
          aY += 0.2;
        }
        if (lowConf.length > 0) {
          s7.addText("LOWER CONFIDENCE", { x: 0.6, y: aY, w: 5, h: 0.3, fontSize: 9, fontFace: "Arial", color: RED, letterSpacing: 2, bold: true });
          aY += 0.35;
          lowConf.forEach(function(a) {
            s7.addText(a.certainty + "%  " + a.text, { x: 0.6, y: aY, w: 6, h: 0.35, fontSize: 11, fontFace: "Arial", color: CREAM });
            s7.addText(DIMS[a.dim].label, { x: 6.8, y: aY, w: 2, h: 0.35, fontSize: 9, fontFace: "Arial", color: MUTED, italic: true });
            aY += 0.4;
          });
        }
        s7.notes = "Walk through your highest and lowest confidence assumptions. Explain why the low-confidence ones matter \u2014 are they critical to your venture or manageable risks?";

        // ── SLIDE 8: The Honest Bet ──
        var s8 = addSlide();
        slideTitle(s8, "The Honest Bet");
        s8.addText("Will this venture exist in two years?", {
          x: 0.6, y: 1.5, w: 11.8, h: 0.6,
          fontSize: 16, fontFace: "Arial", color: MUTED, italic: true
        });
        if (b.synthesis && b.synthesis.survival_estimate) {
          s8.addText(b.synthesis.survival_estimate, {
            x: 0.6, y: 2.4, w: 11.8, h: 3.5,
            fontSize: 16, fontFace: "Arial", color: CREAM, lineSpacingMultiple: 1.6, valign: "top"
          });
        }
        s8.notes = "Share your honest probability estimate. Explain what would change it \u2014 up or down. This is the superforecasting capstone.";

        // ── SLIDE 9: What We'd Do Next ──
        var s9 = addSlide();
        slideTitle(s9, "What We\u2019d Do Next");
        s9.addText("If we had another semester, here\u2019s where we\u2019d focus:", {
          x: 0.6, y: 1.3, w: 11.8, h: 0.5,
          fontSize: 13, fontFace: "Arial", color: MUTED, italic: true
        });
        var nextY = 2.1;
        (b.next_steps || []).forEach(function(step, i) {
          s9.addText((i + 1) + ".", { x: 0.6, y: nextY, w: 0.5, h: 0.6, fontSize: 18, fontFace: "Arial", color: GOLD, bold: true, valign: "top" });
          s9.addText(step, { x: 1.2, y: nextY, w: 11, h: 0.8, fontSize: 14, fontFace: "Arial", color: CREAM, lineSpacingMultiple: 1.4, valign: "top" });
          nextY += 1.1;
        });
        // Closing thought from synthesis
        if (b.synthesis && b.synthesis.student_reflection) {
          s9.addShape(pptx.ShapeType.rect, { x: 0.6, y: nextY + 0.2, w: 11.8, h: 0.02, fill: { color: MUTED } });
          s9.addText(b.synthesis.student_reflection.substring(0, 400), {
            x: 0.6, y: nextY + 0.5, w: 11.8, h: 2,
            fontSize: 12, fontFace: "Arial", color: MUTED, italic: true, lineSpacingMultiple: 1.5, valign: "top"
          });
        }
        s9.notes = "Present your next experiments. Frame them as the most valuable things you could learn to reduce your biggest uncertainties.";

        // Download
        var slug = S.projectName.replace(/[^a-zA-Z0-9]+/g, "-").replace(/^-|-$/g, "").toLowerCase();
        pptx.writeFile({ fileName: "venture-assessment-" + slug + ".pptx" });
      }

      // ═══════════════════════════════════════
      // RENDER HELPERS
      // ═══════════════════════════════════════
      function renderHeader() {
        return e("header", { className: "header" },
          e("span", { className: "logo-mark" }, "ENDURE"),
          e("span", { className: "header-sub" }, "Venture Assessment")
        );
      }

      function currentStepIndex() {
        var p = S.phase;
        if (p === "setup" || p === "loading") {
          // Determine which step is active based on what's complete
          if (S.dimensions.viability.followUpAnswers.length > 0) return 3;
          if (S.dimensions.feasibility.followUpAnswers.length > 0) return 2;
          if (S.dimensions.desirability.followUpAnswers.length > 0) return 1;
          return 0;
        }
        var idx = DIM_ORDER.indexOf(p);
        if (idx >= 0) return idx;
        if (p === "synthesis") return 3;
        if (p === "concept-revision") return 4;
        if (p === "brief") return 5;
        return 0;
      }

      function renderStepBar() {
        var active = currentStepIndex();
        var items = [];
        STEP_LABELS.forEach(function(label, i) {
          if (i > 0) items.push(e("span", { key: "c" + i, className: "step-connector" }, "\u2192"));
          var cls = "step-pill";
          if (i < active) cls += " done";
          else if (i === active) cls += " active";
          items.push(e("span", { key: "s" + i, className: cls }, label));
        });
        return e("div", { className: "step-bar no-print" }, items);
      }

      function renderBackButton() {
        if (S.history.length === 0) return null;
        return e("button", { className: "btn-back no-print", onClick: goBack }, "\u2190 Back");
      }

      function renderConceptRef() {
        if (!S.projectDesc.trim()) return null;
        return e("div", { className: "concept-ref" },
          e("div", { className: "concept-ref-label" }, "Your concept"),
          S.projectDesc
        );
      }

      // ═══════════════════════════════════════
      // RENDER: SETUP
      // ═══════════════════════════════════════
      function renderSetup() {
        return e("div", null,
          renderHeader(),
          e("main", { className: "main" },
            renderStepBar(),
            S.showResume ? e("div", { className: "resume-banner" },
              e("div", { className: "resume-text" }, "You have a session in progress. Resume where you left off?"),
              e("div", { className: "resume-actions" },
                e("button", { className: "btn", onClick: resumeSaved }, "Resume"),
                e("button", { className: "btn btn-ghost", onClick: startFresh }, "Start Fresh")
              )
            ) : null,
            e("div", { className: "eyebrow" }, "Venture Assessment"),
            e("h1", { className: "intro-heading" }, "How strong is your venture \u2014 ", e("em", null, "honestly"), "?"),
            e("p", { className: "intro-body" },
              "This tool walks you through three dimensions of your venture \u2014 Desirability, Feasibility, and Viability \u2014 " +
              "and produces an assessment brief you can submit. Be honest. The quality of your reasoning matters more than the strength of your idea."
            ),
            e("div", { className: "card" },
              e("div", { className: "form-group" },
                e("label", { className: "form-label" }, "Project Name"),
                e("input", {
                  className: "form-input",
                  value: S.projectName,
                  onChange: function(ev) { update({ projectName: ev.target.value }); },
                  placeholder: "Your venture name"
                })
              ),
              e("div", { className: "form-group" },
                e("label", { className: "form-label" }, "Team Members"),
                e("div", { className: "form-hint" }, "Optional"),
                e("input", {
                  className: "form-input",
                  value: S.teamMembers,
                  onChange: function(ev) { update({ teamMembers: ev.target.value }); },
                  placeholder: "Names (optional)"
                })
              ),
              e("div", { className: "form-group" },
                e("label", { className: "form-label" }, "Your Concept Statement"),
                e("div", { className: "form-hint" }, "Describe your venture in 2\u20133 sentences. Who is it for? What does it do? What problem does it solve? Write the version you believe right now \u2014 you\u2019ll have a chance to revise it at the end."),
                e("textarea", {
                  className: "form-input",
                  rows: 5,
                  value: S.projectDesc,
                  onChange: function(ev) { update({ projectDesc: ev.target.value }); },
                  placeholder: "We help [who] with [what problem] by [how]. Our solution works because [insight]\u2026"
                })
              ),
              e("div", { className: "form-group" },
                e("label", { className: "form-label" }, "Full Journal (Optional)"),
                e("div", { className: "form-hint" }, "Paste your full journal here \u2014 all weeks, raw notes, everything. The tool will organize your work across Desirability, Feasibility, and Viability. Skip this if you prefer to paste notes manually in each section."),
                e("textarea", {
                  className: "form-input",
                  rows: 12,
                  value: S.journal.raw,
                  onChange: function(ev) { update({ journal: Object.assign({}, S.journal, { raw: ev.target.value }) }); },
                  placeholder: "Week 1: We started by researching\u2026\nWeek 2: Talked to three people about\u2026\nWeek 3: Built a prototype that\u2026"
                })
              )
            ),
            S.error ? e("div", { className: "error-msg" }, S.error) : null,
            e("button", {
              className: "btn",
              disabled: !S.projectName.trim() || !S.projectDesc.trim(),
              onClick: beginAssessment
            }, "Begin Assessment \u2192")
          )
        );
      }

      // ═══════════════════════════════════════
      // RENDER: LOADING
      // ═══════════════════════════════════════
      function renderLoading() {
        return e("div", null,
          renderHeader(),
          e("main", { className: "main" },
            renderStepBar(),
            e("div", { className: "loading-wrap" },
              e("div", { className: "spinner" }),
              e("div", { className: "loading-text" }, S.loadingMsg)
            )
          )
        );
      }

      // ═══════════════════════════════════════
      // RENDER: DIMENSION (dispatches on subPhase)
      // ═══════════════════════════════════════
      function renderDimension(dim) {
        var cfg = DIMS[dim];
        var d = S.dimensions[dim];
        var sub = S.subPhase;

        if (sub === "paste") return renderPaste(dim, cfg, d);
        if (sub === "questions") return renderQuestions(dim, cfg, d);
        if (sub === "ai-synthesis") return renderSynthesisDisplay(dim, cfg, d);
        if (sub === "assumption-certainty") return renderAssumptionCertainty(dim, cfg, d);
        if (sub === "rating") return renderRating(dim, cfg, d);
        if (sub === "followups") return renderFollowUps(dim, cfg, d);
        return renderPaste(dim, cfg, d);
      }

      // ── Paste-in ──
      function renderPaste(dim, cfg, d) {
        var jp = S.journal.provided && S.journal.parsed && S.journal.parsed[dim];
        var journalSummary = jp ? jp.summary : null;
        var hasContent = d.pasteIn.trim().length > 0;

        return e("div", null,
          renderHeader(),
          e("main", { className: "main" },
            renderStepBar(),
            renderBackButton(),
            e("div", { className: "eyebrow" }, cfg.label),
            e("div", { className: "dim-heading" }, cfg.heading),
            e("div", { className: "dim-body" }, cfg.body),
            renderConceptRef(),
            journalSummary ? e("div", { className: "synthesis-card", style: { marginBottom: 24 } },
              e("div", { className: "synthesis-label" }, "From Your Journal \u2014 " + cfg.label),
              e("div", { className: "synthesis-text", style: { fontSize: 13 } }, journalSummary),
              dim === "desirability" && S.journal.parsed.cross_cutting ? e("div", { className: "gaps-text", style: { marginTop: 10 } },
                "Across all dimensions: " + S.journal.parsed.cross_cutting
              ) : null
            ) : null,
            e("div", { className: "card" },
              e("div", { className: "form-group" },
                e("label", { className: "form-label" },
                  hasContent && S.journal.provided ? "Your " + cfg.label.toLowerCase() + " notes (from journal \u2014 edit or add below)" : cfg.pasteLabel
                ),
                !hasContent && !S.journal.provided ? e("div", { className: "form-hint" }, cfg.pasteHint) : null,
                hasContent && S.journal.provided ? e("div", { className: "form-hint" }, "Edit or add anything the tool missed before continuing.") : null,
                e("textarea", {
                  className: "form-input",
                  rows: hasContent ? 10 : 6,
                  value: d.pasteIn,
                  onChange: function(ev) { updateDim(dim, { pasteIn: ev.target.value }); },
                  placeholder: "Paste your notes here (optional but recommended)\u2026"
                })
              )
            ),
            S.error ? e("div", { className: "error-msg" }, S.error) : null,
            e("button", {
              className: "btn",
              onClick: function() { startDimension(dim); }
            }, "Start " + cfg.label + " Interview \u2192")
          )
        );
      }

      // ── Questions ──
      function renderQuestions(dim, cfg, d) {
        var q = d.questions[d.qIndex];
        if (!q) return renderLoading();
        return e("div", null,
          renderHeader(),
          e("main", { className: "main" },
            renderStepBar(),
            renderBackButton(),
            e("div", { className: "eyebrow" }, cfg.label),
            renderConceptRef(),
            e("div", { className: "progress-track" },
              d.questions.map(function(_, i) {
                var cls = "progress-seg";
                if (i < d.qIndex) cls += " done";
                else if (i === d.qIndex) cls += " active";
                return e("div", { key: i, className: cls });
              })
            ),
            e("div", { className: "q-text" }, q.text),
            q.hint ? e("div", { className: "q-hint" }, q.hint) : null,
            e("textarea", {
              className: "form-input",
              rows: 4,
              value: d.currentAnswer,
              onChange: function(ev) { updateDim(dim, { currentAnswer: ev.target.value }); },
              placeholder: "Your answer \u2014 be specific, estimates are fine\u2026",
              style: { marginBottom: 22 }
            }),
            S.error ? e("div", { className: "error-msg" }, S.error) : null,
            e("div", { className: "actions" },
              e("button", {
                className: "btn",
                disabled: !d.currentAnswer.trim(),
                onClick: function() { submitAnswer(dim); }
              }, d.qIndex + 1 < d.questions.length ? "Next \u2192" : "Continue \u2192"),
              e("span", { className: "q-counter" }, (d.qIndex + 1) + " of " + d.questions.length)
            )
          )
        );
      }

      // ── Synthesis display ──
      function renderSynthesisDisplay(dim, cfg, d) {
        var syn = d.synthesis;
        if (!syn) return renderLoading();

        var cards = [];
        // Main synthesis
        cards.push(e("div", { key: "main", className: "synthesis-card" },
          e("div", { className: "synthesis-label" }, "AI Synthesis"),
          e("div", { className: "synthesis-text" }, syn.synthesis || syn.before_after || "")
        ));
        // Unmet need (desirability)
        if (syn.unmet_need) {
          cards.push(e("div", { key: "need", className: "unmet-need" }, syn.unmet_need));
        }
        // Design implications (desirability)
        if (syn.design_implications) {
          cards.push(e("div", { key: "impl", className: "synthesis-card" },
            e("div", { className: "synthesis-label" }, "Design Implications"),
            e("div", { className: "synthesis-text" },
              Array.isArray(syn.design_implications) ? syn.design_implications.join("\n\n") : syn.design_implications
            )
          ));
        }
        // Before/after (feasibility)
        if (syn.before_after && syn.synthesis) {
          cards.push(e("div", { key: "ba", className: "synthesis-card" },
            e("div", { className: "synthesis-label" }, "Prediction vs Reality"),
            e("div", { className: "synthesis-text" }, syn.before_after)
          ));
        }
        // Feasibility paragraph
        if (syn.feasibility_paragraph) {
          cards.push(e("div", { key: "fp", className: "synthesis-card" },
            e("div", { className: "synthesis-label" }, "Feasibility Assessment"),
            e("div", { className: "synthesis-text" }, syn.feasibility_paragraph)
          ));
        }
        // Maturity badge (feasibility)
        if (syn.maturity) {
          var mClass = "maturity-badge ";
          if (syn.maturity === "Concept") mClass += "maturity-concept";
          else if (syn.maturity === "Early test") mClass += "maturity-early";
          else mClass += "maturity-validated";
          cards.push(e("div", { key: "mat" }, e("span", { className: mClass }, syn.maturity)));
        }
        // TAM/SAM (viability)
        if (syn.tam_sam) {
          cards.push(e("div", { key: "tam", className: "synthesis-card" },
            e("div", { className: "synthesis-label" }, "Market Size"),
            e("div", { className: "synthesis-text" }, syn.tam_sam.description),
            syn.tam_sam.year_one ? e("div", { className: "synthesis-text", style: { marginTop: 8 } }, "Year one estimate: " + syn.tam_sam.year_one) : null
          ));
        }
        // Retention (viability)
        if (syn.retention) {
          cards.push(e("div", { key: "ret", className: "synthesis-card" },
            e("div", { className: "synthesis-label" }, "Retention Logic"),
            e("div", { className: "synthesis-text" }, syn.retention)
          ));
        }
        // Gaps
        if (syn.gaps) {
          cards.push(e("div", { key: "gaps", className: "gaps-text" }, "What you still don\u2019t know: " + syn.gaps));
        }

        return e("div", null,
          renderHeader(),
          e("main", { className: "main" },
            renderStepBar(),
            renderBackButton(),
            e("div", { className: "eyebrow" }, cfg.label + " \u2014 What we heard"),
            e("div", { className: "dim-body" }, "Here\u2019s what emerged from your answers. Review this, then you\u2019ll rate your confidence in the key assumptions."),
            cards,
            e("div", { style: { marginTop: 32 } },
              e("button", {
                className: "btn",
                onClick: function() { navigate(dim, "assumption-certainty"); }
              }, "Rate Your Assumptions \u2192")
            )
          )
        );
      }

      // ── Assumption certainty ──
      function renderAssumptionCertainty(dim, cfg, d) {
        return e("div", null,
          renderHeader(),
          e("main", { className: "main" },
            renderStepBar(),
            renderBackButton(),
            e("div", { className: "eyebrow" }, cfg.label + " \u2014 Assumption Check"),
            e("div", { className: "dim-heading" }, "How confident are you in these assumptions?"),
            e("div", { className: "dim-body" }, "Your " + cfg.label.toLowerCase() + " assessment rests on these key assumptions. Rate your confidence in each one."),
            e("div", { className: "assumption-list" },
              d.assumptions.map(function(a) {
                return e("div", { key: a.id, className: "assumption-card" },
                  e("div", { className: "assumption-text" }, "\u201C" + a.text + "\u201D"),
                  e("div", { className: "certainty-pills" },
                    [20, 40, 60, 80].map(function(val) {
                      return e("button", {
                        key: val,
                        className: "certainty-pill" + (a.certainty === val ? " selected" : ""),
                        onClick: function() { setCertainty(dim, a.id, val); }
                      }, val + "%");
                    })
                  )
                );
              })
            ),
            e("button", {
              className: "btn",
              disabled: !allCertaintiesSet(dim),
              onClick: function() { navigate(dim, "rating"); }
            }, "Continue to Rating \u2192")
          )
        );
      }

      // ── Rating ──
      function renderRating(dim, cfg, d) {
        // Show assumptions summary above rating
        var assumptionSummary = e("div", { className: "card", style: { marginBottom: 24 } },
          e("div", { className: "synthesis-label" }, "Your assumption certainties"),
          d.assumptions.map(function(a) {
            return e("div", { key: a.id, style: { display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: "1px solid rgba(232,227,216,0.04)" } },
              e("span", { style: { fontSize: 13, color: "rgba(232,227,216,0.5)", flex: 1 } }, a.text),
              e("span", { className: certClass(a.certainty), style: { fontFamily: "'IBM Plex Mono', monospace", fontSize: 13, fontWeight: 600, marginLeft: 12 } }, a.certainty + "%")
            );
          })
        );

        return e("div", null,
          renderHeader(),
          e("main", { className: "main" },
            renderStepBar(),
            renderBackButton(),
            e("div", { className: "eyebrow" }, cfg.label + " \u2014 Self-Assessment"),
            e("div", { className: "dim-heading" }, "Rate your " + cfg.label.toLowerCase()),
            e("div", { className: "dim-body" }, "Based on everything above \u2014 your interview, the synthesis, and your confidence in the assumptions \u2014 how would you rate this dimension?"),
            assumptionSummary,
            e("div", { className: "rating-cards" },
              cfg.ratings.map(function(r) {
                return e("div", {
                  key: r.n,
                  className: "rating-card" + (d.rating === r.n ? " selected" : ""),
                  onClick: function() { selectRating(dim, r.n); }
                },
                  e("div", { className: "rating-number" }, r.n),
                  e("div", { className: "rating-label" }, r.label),
                  e("div", { className: "rating-desc" }, r.desc)
                );
              })
            ),
            S.error ? e("div", { className: "error-msg" }, S.error) : null,
            e("button", {
              className: "btn",
              disabled: d.rating === 0,
              onClick: function() { submitRating(dim); }
            }, "Continue \u2192")
          )
        );
      }

      // ── Follow-ups ──
      function renderFollowUps(dim, cfg, d) {
        var q = d.followUpQuestions[d.followUpIndex];
        if (!q) return renderLoading();
        return e("div", null,
          renderHeader(),
          e("main", { className: "main" },
            renderStepBar(),
            renderBackButton(),
            e("div", { className: "eyebrow" }, cfg.label + " \u2014 Follow-up"),
            e("div", { className: "progress-track" },
              d.followUpQuestions.map(function(_, i) {
                var cls = "progress-seg";
                if (i < d.followUpIndex) cls += " done";
                else if (i === d.followUpIndex) cls += " active";
                return e("div", { key: i, className: cls });
              })
            ),
            e("div", { className: "q-text" }, q.text),
            q.hint ? e("div", { className: "q-hint" }, q.hint) : null,
            e("textarea", {
              className: "form-input",
              rows: 4,
              value: d.currentFollowUp,
              onChange: function(ev) { updateDim(dim, { currentFollowUp: ev.target.value }); },
              placeholder: "Your answer\u2026",
              style: { marginBottom: 22 }
            }),
            e("div", { className: "actions" },
              e("button", {
                className: "btn",
                disabled: !d.currentFollowUp.trim(),
                onClick: function() { submitFollowUp(dim); }
              }, d.followUpIndex + 1 < d.followUpQuestions.length ? "Next \u2192" : "Continue \u2192"),
              e("span", { className: "q-counter" }, (d.followUpIndex + 1) + " of " + d.followUpQuestions.length)
            )
          )
        );
      }

      // ═══════════════════════════════════════
      // RENDER: SYNTHESIS
      // ═══════════════════════════════════════
      function renderSynthesis() {
        var q = S.synthesisQuestions[S.synthesisIndex];
        if (!q) return renderLoading();
        return e("div", null,
          renderHeader(),
          e("main", { className: "main" },
            renderStepBar(),
            renderBackButton(),
            e("div", { className: "eyebrow" }, "Synthesis"),
            e("div", { className: "progress-track" },
              S.synthesisQuestions.map(function(_, i) {
                var cls = "progress-seg";
                if (i < S.synthesisIndex) cls += " done";
                else if (i === S.synthesisIndex) cls += " active";
                return e("div", { key: i, className: cls });
              })
            ),
            e("div", { className: "q-text" }, q.text),
            q.hint ? e("div", { className: "q-hint" }, q.hint) : null,
            e("textarea", {
              className: "form-input",
              rows: 6,
              value: S.currentSynthesisAnswer,
              onChange: function(ev) { update({ currentSynthesisAnswer: ev.target.value }); },
              placeholder: "Take your time with this one\u2026",
              style: { marginBottom: 22 }
            }),
            S.error ? e("div", { className: "error-msg" }, S.error) : null,
            e("div", { className: "actions" },
              e("button", {
                className: "btn",
                disabled: !S.currentSynthesisAnswer.trim(),
                onClick: submitSynthesisAnswer
              }, S.synthesisIndex + 1 < S.synthesisQuestions.length ? "Next \u2192" : "Continue \u2192"),
              e("span", { className: "q-counter" }, (S.synthesisIndex + 1) + " of " + S.synthesisQuestions.length)
            )
          )
        );
      }

      // ═══════════════════════════════════════
      // RENDER: CONCEPT REVISION
      // ═══════════════════════════════════════
      function renderConceptRevision() {
        if (S.subPhase === "revise") {
          return e("div", null,
            renderHeader(),
            e("main", { className: "main" },
              renderStepBar(),
              renderBackButton(),
              e("div", { className: "eyebrow" }, "Concept Revision"),
              e("div", { className: "dim-heading" }, "Has your thinking changed?"),
              e("div", { className: "dim-body" }, "You\u2019ve now assessed desirability, feasibility, and viability. Look at what you wrote at the start and decide if it still holds."),
              e("div", { className: "card", style: { marginBottom: 24 } },
                e("div", { className: "synthesis-label" }, "You wrote this at the start"),
                e("div", { className: "brief-text", style: { color: "rgba(232,227,216,0.5)" } }, S.projectDesc)
              ),
              e("div", { className: "card" },
                e("div", { className: "form-group" },
                  e("label", { className: "form-label" }, "Your Revised Concept Statement"),
                  e("div", { className: "form-hint" }, "Edit below if your assessment changed your thinking. It\u2019s fine to keep it the same if your original framing held up."),
                  e("textarea", {
                    className: "form-input",
                    rows: 5,
                    value: S.conceptRevised,
                    onChange: function(ev) { update({ conceptRevised: ev.target.value }); }
                  })
                )
              ),
              S.error ? e("div", { className: "error-msg" }, S.error) : null,
              e("button", {
                className: "btn",
                disabled: !S.conceptRevised.trim(),
                onClick: submitConceptRevision
              }, "Continue \u2192")
            )
          );
        }

        // subPhase === "reflect"
        return e("div", null,
          renderHeader(),
          e("main", { className: "main" },
            renderStepBar(),
            renderBackButton(),
            e("div", { className: "eyebrow" }, "Concept Revision"),
            e("div", { className: "q-text" }, S.conceptFollowUpQuestion || "What changed between your original concept and this version \u2014 and why?"),
            e("div", { className: "q-hint" }, "If nothing changed, explain why your original framing held up. If it changed, point to which part of the assessment drove the revision."),
            e("textarea", {
              className: "form-input",
              rows: 5,
              value: S.conceptReflection,
              onChange: function(ev) { update({ conceptReflection: ev.target.value }); },
              placeholder: "Your reflection\u2026",
              style: { marginBottom: 22 }
            }),
            S.error ? e("div", { className: "error-msg" }, S.error) : null,
            e("button", {
              className: "btn",
              disabled: !S.conceptReflection.trim(),
              onClick: submitConceptReflection
            }, "Generate Brief \u2192")
          )
        );
      }

      // ═══════════════════════════════════════
      // RENDER: BRIEF
      // ═══════════════════════════════════════
      function renderBrief() {
        if (!S.brief) return renderLoading();
        var b = S.brief;
        var allA = getAllAssumptionsSorted();
        var avg = getAvgCertainty();

        function dimSection(dim, title, content) {
          var d = S.dimensions[dim];
          var rInfo = DIMS[dim].ratings[d.rating - 1];
          return e("div", { key: dim, className: "brief-section" },
            e("div", { className: "brief-section-title" }, title),
            e("div", { className: "rating-badge rating-badge-" + d.rating },
              ratingDots(d.rating) + " " + rInfo.label
            ),
            content
          );
        }

        return e("div", null,
          renderHeader(),
          e("main", { className: "main" },
            renderStepBar(),

            // Header
            e("div", { className: "brief-header" },
              e("div", { className: "eyebrow" }, S.projectName),
              e("div", { className: "brief-title" }, "Venture Assessment Brief"),
              e("div", { className: "brief-meta" },
                (S.teamMembers.trim() ? S.teamMembers + " \u00B7 " : "") +
                new Date().toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" })
              )
            ),

            // Concept
            e("div", { className: "brief-section" },
              e("div", { className: "brief-section-title" }, "The Concept"),
              e("div", { className: "brief-card" },
                e("div", { className: "brief-text", style: { fontSize: 16 } },
                  b.concept ? b.concept.revised : (S.conceptRevised || S.projectDesc)
                )
              ),
              S.conceptRevised && S.conceptRevised !== S.projectDesc ? e("div", { className: "brief-card", style: { opacity: 0.6 } },
                e("div", { className: "synthesis-label" }, "Original Concept"),
                e("div", { className: "brief-text" }, S.projectDesc)
              ) : null,
              S.conceptReflection.trim() ? e("div", { className: "brief-card" },
                e("div", { className: "synthesis-label" }, "What Changed and Why"),
                e("div", { className: "brief-text" }, S.conceptReflection)
              ) : null,
              b.concept && b.concept.evolution ? e("div", { className: "gaps-text" }, b.concept.evolution) : null
            ),

            // Desirability
            dimSection("desirability", "Desirability Assessment",
              e("div", null,
                e("div", { className: "brief-card" },
                  e("div", { className: "brief-text" }, b.desirability.insight)
                ),
                b.desirability.unmet_need ? e("div", { className: "unmet-need" }, b.desirability.unmet_need) : null,
                e("div", { className: "brief-card" },
                  e("div", { className: "synthesis-label" }, "Design Implications"),
                  e("div", { className: "brief-text" }, b.desirability.implications)
                ),
                e("div", { className: "brief-card" },
                  e("div", { className: "synthesis-label" }, "Student\u2019s Evidence"),
                  e("div", { className: "brief-text" }, b.desirability.evidence_summary)
                ),
                e("div", { className: "gaps-text" }, "Gaps: " + b.desirability.gaps),
                e("div", { className: "gaps-text" }, "Top uncertainty: " + b.desirability.top_uncertainty)
              )
            ),

            // Feasibility
            dimSection("feasibility", "Feasibility Assessment",
              e("div", null,
                e("div", { className: "brief-card" },
                  e("div", { className: "brief-text" }, b.feasibility.learning)
                ),
                e("div", { className: "brief-card" },
                  e("div", { className: "synthesis-label" }, "Prediction vs Reality"),
                  e("div", { className: "brief-text" }, b.feasibility.before_after)
                ),
                b.feasibility.maturity ? e("div", { style: { marginBottom: 16 } },
                  e("span", { className: "maturity-badge " + (b.feasibility.maturity === "Concept" ? "maturity-concept" : b.feasibility.maturity === "Early test" ? "maturity-early" : "maturity-validated") },
                    b.feasibility.maturity
                  )
                ) : null,
                e("div", { className: "brief-card" },
                  e("div", { className: "synthesis-label" }, "Student\u2019s Evidence"),
                  e("div", { className: "brief-text" }, b.feasibility.evidence_summary)
                ),
                e("div", { className: "gaps-text" }, "Gaps: " + b.feasibility.gaps),
                e("div", { className: "gaps-text" }, "Top uncertainty: " + b.feasibility.top_uncertainty)
              )
            ),

            // Viability
            e("div", { className: "page-break" }),
            dimSection("viability", "Viability Assessment",
              e("div", null,
                e("div", { className: "brief-card" },
                  e("div", { className: "brief-text" }, b.viability.economics)
                ),
                e("div", { className: "brief-card" },
                  e("div", { className: "synthesis-label" }, "Market Size"),
                  e("div", { className: "brief-text" }, b.viability.market)
                ),
                e("div", { className: "brief-card" },
                  e("div", { className: "synthesis-label" }, "Retention & Protectability"),
                  e("div", { className: "brief-text" }, b.viability.retention + "\n\n" + b.viability.protectability)
                ),
                e("div", { className: "brief-card" },
                  e("div", { className: "synthesis-label" }, "Student\u2019s Evidence"),
                  e("div", { className: "brief-text" }, b.viability.evidence_summary)
                ),
                e("div", { className: "gaps-text" }, "Gaps: " + b.viability.gaps),
                e("div", { className: "gaps-text" }, "Top uncertainty: " + b.viability.top_uncertainty)
              )
            ),

            // Integrated Assessment
            e("div", { className: "page-break" }),
            e("div", { className: "brief-section" },
              e("div", { className: "brief-section-title" }, "Integrated Assessment"),
              e("div", { className: "brief-card" },
                e("div", { className: "brief-text" }, b.synthesis.student_reflection)
              ),
              b.synthesis.tensions ? e("div", { className: "brief-card" },
                e("div", { className: "synthesis-label" }, "Tensions"),
                e("div", { className: "brief-text" }, b.synthesis.tensions)
              ) : null,
              b.synthesis.reinforcements ? e("div", { className: "brief-card" },
                e("div", { className: "synthesis-label" }, "Reinforcements"),
                e("div", { className: "brief-text" }, b.synthesis.reinforcements)
              ) : null,
              e("div", { className: "brief-card" },
                e("div", { className: "synthesis-label" }, "Two-Year Survival Estimate"),
                e("div", { className: "brief-text" }, b.synthesis.survival_estimate)
              )
            ),

            // Uncertainty Map
            e("div", { className: "brief-section" },
              e("div", { className: "brief-section-title" }, "Uncertainty Map"),
              e("div", { className: "brief-card" },
                e("div", { className: "avg-confidence" }, avg + "%"),
                e("div", { className: "avg-label" }, "Average confidence across " + allA.length + " assumptions"),
                allA.map(function(a, i) {
                  return e("div", { key: i, className: "uncertainty-item" },
                    e("span", { className: "uncertainty-cert " + certClass(a.certainty) }, a.certainty + "%"),
                    e("span", { className: "uncertainty-text" }, a.text),
                    e("span", { className: "uncertainty-dim" }, DIMS[a.dim].label)
                  );
                }),
                b.uncertainty_map && b.uncertainty_map.commentary ? e("div", { className: "brief-text", style: { marginTop: 16, paddingTop: 16, borderTop: "1px solid rgba(232,227,216,0.06)" } },
                  b.uncertainty_map.commentary
                ) : null
              )
            ),

            // Next Steps
            e("div", { className: "brief-section" },
              e("div", { className: "brief-section-title" }, "Recommended Next Steps"),
              e("div", { className: "brief-card" },
                (b.next_steps || []).map(function(step, i) {
                  return e("div", { key: i, style: { display: "flex", gap: 12, marginBottom: i < (b.next_steps.length - 1) ? 12 : 0 } },
                    e("span", { style: { fontFamily: "'IBM Plex Mono', monospace", fontSize: 14, fontWeight: 600, color: "#D4A853" } }, (i + 1) + "."),
                    e("span", { className: "brief-text" }, step)
                  );
                })
              )
            ),

            // Footer
            e("div", { style: { fontSize: 12, color: "rgba(232,227,216,0.25)", textAlign: "center", marginTop: 40, paddingTop: 20, borderTop: "1px solid rgba(232,227,216,0.06)" } },
              "Generated with ENDURE Venture Assessment Tool \u00B7 " +
              new Date().toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" }),
              e("br"),
              "This assessment reflects the student\u2019s reasoning and evidence as of this date."
            ),

            // Actions
            e("div", { className: "actions no-print", style: { marginTop: 32 } },
              e("button", { className: "btn", onClick: downloadDocx }, "Download Brief"),
              e("button", { className: "btn", onClick: generatePPTX }, "Download Deck"),
              e("button", {
                className: "btn btn-ghost btn-copy" + (S.copied ? " copied" : ""),
                onClick: copyToClipboard
              }, S.copied ? "Copied!" : "Copy Text"),
              e("button", { className: "btn btn-ghost", onClick: function() { window.print(); } }, "Print"),
              e("button", { className: "btn btn-ghost", onClick: startFresh }, "Start Over")
            )
          )
        );
      }

      // ═══════════════════════════════════════
      // MAIN RENDER
      // ═══════════════════════════════════════
      if (S.phase === "loading") return renderLoading();
      if (S.phase === "setup") return renderSetup();
      if (S.phase === "brief") return renderBrief();
      if (S.phase === "concept-revision") return renderConceptRevision();
      if (S.phase === "synthesis") return renderSynthesis();
      if (DIM_ORDER.indexOf(S.phase) >= 0) return renderDimension(S.phase);
      return renderSetup();
    }

    var root = ReactDOM.createRoot(document.getElementById("app"));
    root.render(e(App));
  </script>
</body>
</html>
