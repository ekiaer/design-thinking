<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ENDURE · Venture Assessment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0D1117;
      color: #E8E3D8;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── HEADER ── */
    .header {
      border-bottom: 1px solid rgba(212,168,83,0.18);
      padding: 18px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo-mark {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 20px;
      font-weight: 600;
      color: #D4A853;
      letter-spacing: -1px;
    }
    .header-sub {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 300;
      color: rgba(232,227,216,0.4);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .main {
      max-width: 740px;
      margin: 0 auto;
      padding: 32px 40px 80px;
    }

    /* ── STEP INDICATOR ── */
    .step-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }
    .step-pill {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid rgba(232,227,216,0.08);
      color: rgba(232,227,216,0.25);
      transition: all 0.2s;
      white-space: nowrap;
    }
    .step-pill.active {
      border-color: rgba(212,168,83,0.5);
      color: #D4A853;
      background: rgba(212,168,83,0.08);
    }
    .step-pill.done {
      border-color: rgba(92,184,138,0.3);
      color: rgba(92,184,138,0.6);
    }
    .step-connector {
      align-self: center;
      color: rgba(232,227,216,0.12);
      font-size: 10px;
    }

    /* ── TYPOGRAPHY ── */
    .eyebrow {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #D4A853;
      margin-bottom: 18px;
    }
    .intro-heading {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      line-height: 1.1;
      font-weight: 400;
      color: #E8E3D8;
      margin-bottom: 22px;
    }
    .intro-body {
      font-size: 15px;
      color: rgba(232,227,216,0.55);
      max-width: 560px;
      line-height: 1.75;
      margin-bottom: 40px;
    }
    .section-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(212,168,83,0.6);
      margin-bottom: 16px;
    }
    .dim-heading {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      line-height: 1.2;
      font-weight: 400;
      color: #E8E3D8;
      margin-bottom: 10px;
    }
    .dim-body {
      font-size: 14px;
      color: rgba(232,227,216,0.45);
      line-height: 1.7;
      margin-bottom: 32px;
      max-width: 560px;
    }

    /* ── CARDS & FORMS ── */
    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(232,227,216,0.08);
      border-radius: 8px;
      padding: 32px;
      margin-bottom: 32px;
    }
    .form-group { margin-bottom: 24px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-label {
      display: block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(212,168,83,0.75);
      margin-bottom: 8px;
    }
    .form-hint {
      font-size: 12px;
      color: rgba(232,227,216,0.35);
      margin-bottom: 8px;
      font-style: italic;
    }
    .form-input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(232,227,216,0.1);
      border-radius: 4px;
      color: #E8E3D8;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }
    .form-input:focus { border-color: rgba(212,168,83,0.45); }
    .form-input::placeholder { color: rgba(232,227,216,0.2); }

    /* ── BUTTONS ── */
    .btn {
      background: #D4A853;
      color: #0D1117;
      border: none;
      border-radius: 4px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      padding: 13px 28px;
      cursor: pointer;
      text-transform: uppercase;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    .btn-ghost {
      background: transparent;
      color: rgba(232,227,216,0.5);
      border: 1px solid rgba(232,227,216,0.12);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.04); opacity: 1; color: #E8E3D8; }
    .btn-back {
      background: transparent;
      color: rgba(232,227,216,0.35);
      border: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.05em;
      cursor: pointer;
      padding: 8px 0;
      margin-bottom: 20px;
      transition: color 0.15s;
    }
    .btn-back:hover { color: rgba(232,227,216,0.6); }
    .btn-copy {
      background: transparent;
      color: rgba(232,227,216,0.5);
      border: 1px solid rgba(232,227,216,0.12);
    }
    .btn-copy:hover { background: rgba(255,255,255,0.04); opacity: 1; color: #E8E3D8; }
    .btn-copy.copied { color: #5CB88A; border-color: rgba(92,184,138,0.3); }
    .actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

    /* ── PROGRESS BAR (questions) ── */
    .progress-track {
      display: flex;
      gap: 5px;
      margin-bottom: 40px;
    }
    .progress-seg {
      height: 3px;
      flex: 1;
      border-radius: 2px;
      background: rgba(232,227,216,0.08);
      transition: background 0.3s;
    }
    .progress-seg.active { background: #D4A853; }
    .progress-seg.done { background: rgba(212,168,83,0.35); }

    /* ── INTERVIEW QUESTIONS ── */
    .q-text {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      line-height: 1.35;
      font-weight: 400;
      color: #E8E3D8;
      margin-bottom: 10px;
    }
    .q-hint {
      font-size: 13px;
      color: rgba(232,227,216,0.38);
      font-style: italic;
      margin-bottom: 28px;
    }
    .q-counter {
      font-size: 12px;
      color: rgba(232,227,216,0.28);
      align-self: center;
    }

    /* ── SYNTHESIS DISPLAY ── */
    .synthesis-card {
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(232,227,216,0.07);
      border-left: 3px solid rgba(212,168,83,0.4);
      border-radius: 0 8px 8px 0;
      padding: 28px;
      margin-bottom: 24px;
    }
    .synthesis-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(212,168,83,0.55);
      margin-bottom: 10px;
    }
    .synthesis-text {
      font-size: 14px;
      color: rgba(232,227,216,0.65);
      line-height: 1.8;
      white-space: pre-wrap;
    }
    .unmet-need {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-style: italic;
      color: rgba(212,168,83,0.7);
      line-height: 1.5;
      padding: 18px 0;
      border-top: 1px solid rgba(232,227,216,0.06);
      border-bottom: 1px solid rgba(232,227,216,0.06);
      margin: 16px 0;
    }
    .gaps-text {
      font-size: 13px;
      color: rgba(232,227,216,0.38);
      font-style: italic;
      line-height: 1.7;
      margin-top: 14px;
    }
    .reading-connection {
      background: rgba(126,184,218,0.04);
      border-left: 2px solid rgba(126,184,218,0.25);
      border-radius: 0 8px 8px 0;
      padding: 18px 20px;
      margin-top: 20px;
    }
    .reading-connection-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(126,184,218,0.6);
      margin-bottom: 8px;
    }
    .reading-connection-text {
      font-size: 13px;
      color: rgba(232,227,216,0.55);
      line-height: 1.7;
      font-style: italic;
    }
    .reading-connection-sources {
      font-size: 11px;
      color: rgba(232,227,216,0.3);
      margin-top: 10px;
    }
    .maturity-badge {
      display: inline-block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-top: 12px;
    }
    .maturity-concept { border: 1px solid rgba(224,117,88,0.35); color: #E07558; }
    .maturity-early { border: 1px solid rgba(212,168,83,0.35); color: #D4A853; }
    .maturity-validated { border: 1px solid rgba(92,184,138,0.35); color: #5CB88A; }

    /* ── ASSUMPTION CERTAINTY ── */
    .assumption-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 32px;
    }
    .assumption-card {
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(232,227,216,0.07);
      border-radius: 8px;
      padding: 20px 24px;
    }
    .assumption-text {
      font-size: 14px;
      color: rgba(232,227,216,0.6);
      line-height: 1.6;
      margin-bottom: 14px;
    }
    .certainty-pills {
      display: flex;
      gap: 8px;
    }
    .certainty-pill {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 4px;
      border: 1px solid rgba(232,227,216,0.1);
      background: transparent;
      color: rgba(232,227,216,0.35);
      cursor: pointer;
      transition: all 0.15s;
    }
    .certainty-pill:hover {
      border-color: rgba(212,168,83,0.3);
      color: rgba(232,227,216,0.6);
    }
    .certainty-pill.selected {
      background: #D4A853;
      border-color: #D4A853;
      color: #0D1117;
    }

    /* ── RATING CARDS ── */
    .rating-cards {
      display: flex;
      gap: 14px;
      margin-bottom: 32px;
    }
    .rating-card {
      flex: 1;
      cursor: pointer;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(232,227,216,0.08);
      border-radius: 8px;
      padding: 24px 20px;
      transition: border-color 0.2s, background 0.2s;
      text-align: center;
    }
    .rating-card:hover { border-color: rgba(212,168,83,0.3); }
    .rating-card.selected {
      border-color: rgba(212,168,83,0.6);
      background: rgba(212,168,83,0.06);
    }
    .rating-number {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 700;
      color: rgba(232,227,216,0.2);
      margin-bottom: 8px;
      transition: color 0.2s;
    }
    .rating-card.selected .rating-number { color: #D4A853; }
    .rating-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(212,168,83,0.5);
      margin-bottom: 8px;
    }
    .rating-desc {
      font-size: 12px;
      color: rgba(232,227,216,0.35);
      line-height: 1.5;
    }

    /* ── LOADING ── */
    .loading-wrap {
      padding: 100px 0;
      text-align: center;
    }
    .spinner {
      width: 38px; height: 38px;
      border: 2px solid rgba(212,168,83,0.12);
      border-top-color: #D4A853;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(212,168,83,0.55);
    }

    /* ── BRIEF OUTPUT ── */
    .brief-header {
      margin-bottom: 40px;
    }
    .brief-title {
      font-family: 'Playfair Display', serif;
      font-size: 34px;
      font-weight: 400;
      color: #E8E3D8;
      margin-bottom: 4px;
    }
    .brief-meta {
      font-size: 13px;
      color: rgba(232,227,216,0.35);
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: 0.05em;
    }
    .brief-section {
      margin-bottom: 40px;
    }
    .brief-section-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(212,168,83,0.6);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(232,227,216,0.06);
    }
    .brief-card {
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(232,227,216,0.07);
      border-radius: 8px;
      padding: 28px;
      margin-bottom: 16px;
    }
    .brief-text {
      font-size: 14px;
      color: rgba(232,227,216,0.62);
      line-height: 1.85;
      white-space: pre-wrap;
    }
    .rating-badge {
      display: inline-block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      padding: 4px 12px;
      border-radius: 4px;
      margin-bottom: 14px;
    }
    .rating-badge-1 { background: rgba(224,117,88,0.12); color: #E07558; }
    .rating-badge-2 { background: rgba(212,168,83,0.12); color: #D4A853; }
    .rating-badge-3 { background: rgba(92,184,138,0.12); color: #5CB88A; }

    /* Uncertainty map */
    .uncertainty-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 10px 0;
      border-bottom: 1px solid rgba(232,227,216,0.04);
      gap: 16px;
    }
    .uncertainty-item:last-child { border-bottom: none; }
    .uncertainty-text {
      font-size: 13px;
      color: rgba(232,227,216,0.55);
      flex: 1;
    }
    .uncertainty-dim {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(232,227,216,0.25);
      white-space: nowrap;
    }
    .uncertainty-cert {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }
    .cert-low { color: #E07558; }
    .cert-mid { color: #D4A853; }
    .cert-high { color: #5CB88A; }
    .avg-confidence {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 28px;
      font-weight: 600;
      color: #D4A853;
      margin-bottom: 6px;
    }
    .avg-label {
      font-size: 12px;
      color: rgba(232,227,216,0.35);
      margin-bottom: 16px;
    }

    /* ── CONCEPT REFERENCE ── */
    .concept-ref {
      font-size: 13px;
      color: rgba(232,227,216,0.35);
      font-style: italic;
      line-height: 1.6;
      padding: 14px 18px;
      border-left: 2px solid rgba(212,168,83,0.2);
      margin-bottom: 28px;
    }
    .concept-ref-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(212,168,83,0.4);
      font-style: normal;
      margin-bottom: 4px;
    }

    /* ── ERROR ── */
    .error-msg {
      color: #E07558;
      font-size: 13px;
      margin-bottom: 16px;
    }

    /* ── RESUME BANNER ── */
    .resume-banner {
      background: rgba(212,168,83,0.06);
      border: 1px solid rgba(212,168,83,0.2);
      border-radius: 8px;
      padding: 20px 24px;
      margin-bottom: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .resume-text {
      font-size: 14px;
      color: rgba(232,227,216,0.6);
    }
    .resume-actions { display: flex; gap: 10px; }

    /* ── PRINT ── */
    @media print {
      body { background: #fff; color: #111; }
      .header { border-color: #ddd; background: #fff; }
      .logo-mark { color: #222; }
      .no-print { display: none !important; }
      .step-bar { display: none !important; }
      .eyebrow, .section-label, .brief-section-title, .synthesis-label { color: #555; }
      .brief-card, .synthesis-card { background: #f8f6f0; border-color: #ddd; }
      .brief-text, .synthesis-text { color: #333; }
      .intro-heading, .brief-title, .dim-heading { color: #111; }
      .q-text { color: #111; }
      .rating-badge-1 { background: #fef0ec; color: #c0523a; }
      .rating-badge-2 { background: #fdf6e8; color: #9a7a2a; }
      .rating-badge-3 { background: #edf7f1; color: #3a8a5c; }
      .uncertainty-text { color: #333; }
      .uncertainty-cert { color: #111; }
      .cert-low { color: #c0523a; }
      .cert-mid { color: #9a7a2a; }
      .cert-high { color: #3a8a5c; }
      .unmet-need { color: #555; border-color: #ddd; }
      .synthesis-card { border-left-color: #999; }
      .reading-connection { background: #f4f8fb; border-left-color: #8ab4d0; }
      .reading-connection-label { color: #5a8ba8; }
      .reading-connection-text { color: #333; }
      .reading-connection-sources { color: #888; }
      .brief-section { page-break-inside: avoid; }
      .brief-section + .brief-section { page-break-before: auto; }
      .page-break { page-break-before: always; }
    }

    @media (max-width: 600px) {
      .main { padding: 24px 20px 60px; }
      .intro-heading { font-size: 30px; }
      .dim-heading { font-size: 24px; }
      .q-text { font-size: 20px; }
      .rating-cards { flex-direction: column; }
      .certainty-pills { flex-wrap: wrap; }
      .step-bar { gap: 4px; }
      .step-pill { font-size: 9px; padding: 4px 8px; }
      .step-connector { display: none; }
      .resume-banner { flex-direction: column; align-items: stretch; }
      .brief-title { font-size: 26px; }
      .avg-confidence { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>

  <script>
    // ═══════════════════════════════════════
    // CONFIG
    // ═══════════════════════════════════════
    var API_PROXY_URL = "https://endure-proxy.ekiaer.workers.dev";
    var e = React.createElement;
    var useState = React.useState;
    var useEffect = React.useEffect;

    // ═══════════════════════════════════════
    // DIMENSION CONFIG
    // ═══════════════════════════════════════
    var DIMS = {
      desirability: {
        label: "Desirability",
        pasteLabel: "Field Notes & Interview Excerpts",
        pasteHint: "Paste any observations, interview quotes, or field notes from your customer research. Raw notes are fine.",
        heading: "Who is this really for?",
        body: "Let\u2019s get specific about your customer \u2014 not a demographic segment, but a real person. We\u2019ll work from your field observations to a clear insight about what they need and why.",
        ratings: [
          { n: 1, label: "Significant limitations", desc: "You have real concerns about whether customers want this enough to change behavior." },
          { n: 2, label: "Manageable limitations", desc: "There\u2019s evidence of interest, but open questions remain about depth of need or willingness to switch." },
          { n: 3, label: "Unique advantage", desc: "You have specific, validated evidence that a real customer segment has an unmet need your solution addresses better than alternatives." }
        ]
      },
      feasibility: {
        label: "Feasibility",
        pasteLabel: "Experiment Results & Prototype Feedback",
        pasteHint: "Paste results from any experiments, user tests, or prototype feedback sessions you\u2019ve done.",
        heading: "Can you actually build and deliver this?",

          body: payload
        });
        if (res.status === 529 && attempt < maxRetries) {
          await new Promise(function(r) { setTimeout(r, delay); });
          delay *= 2;
          continue;
        }
        if (!res.ok) {
          var errBody = await res.text();
          throw new Error("API error: " + res.status + " " + errBody);
        }
        var data = await res.json();
        var text = data.content[0].text;
        text = text.replace(/^```(?:json)?\s*\n?/i, "").replace(/\n?```\s*$/i, "");
        return text;
      }
    }

    // ═══════════════════════════════════════
    // APP
    // ═══════════════════════════════════════
    function App() {
      var stateHook = useState(function() {
        var saved = sessionStorage.getItem("va-state");
        if (saved) {
          try {
            var parsed = JSON.parse(saved);
            if (parsed.phase !== "setup") {
              parsed.showResume = true;
              parsed._savedPhase = parsed.phase;
              parsed._savedSubPhase = parsed.subPhase;
              parsed.phase = "setup";
            }
            return parsed;
          } catch (err) { /* ignore */ }
        }
        return INITIAL_STATE;
      });
      var S = stateHook[0];
      var setS = stateHook[1];

      function update(partial) {
        setS(function(prev) {
          var next = Object.assign({}, prev, partial);
          // Strip large binary data before persisting to sessionStorage
          var toSave = Object.assign({}, next, { journalImages: [] });
          sessionStorage.setItem("va-state", JSON.stringify(toSave));
          return next;
        });
      }

      function updateDim(dim, partial) {
        setS(function(prev) {
          var dims = Object.assign({}, prev.dimensions);
          dims[dim] = Object.assign({}, dims[dim], partial);
          var next = Object.assign({}, prev, { dimensions: dims });
          var toSave = Object.assign({}, next, { journalImages: [] });
          sessionStorage.setItem("va-state", JSON.stringify(toSave));
          return next;
        });
      }

      function pushHistory() {
        setS(function(prev) {
          var h = prev.history.slice();
          h.push({ phase: prev.phase, subPhase: prev.subPhase });
          return Object.assign({}, prev, { history: h });
        });
      }

      function goBack() {
        setS(function(prev) {
          if (prev.history.length === 0) return prev;
          var h = prev.history.slice();
          var last = h.pop();
          var next = Object.assign({}, prev, { history: h, phase: last.phase, subPhase: last.subPhase, error: "" });
          var toSave = Object.assign({}, next, { journalImages: [] });
          sessionStorage.setItem("va-state", JSON.stringify(toSave));
          return next;
        });
      }

      function navigate(phase, subPhase) {
        pushHistory();
        update({ phase: phase, subPhase: subPhase || "paste", error: "" });
      }

      function resumeSaved() {
        update({ phase: S._savedPhase, subPhase: S._savedSubPhase, showResume: false, _savedPhase: undefined, _savedSubPhase: undefined });
      }

      function startFresh() {
        sessionStorage.removeItem("va-state");
        setS(INITIAL_STATE);
      }

      // ── Journal upload ──
      var MAX_JOURNAL_IMAGES = 20;

      function handleJournalUpload(ev) {
        var file = ev.target.files && ev.target.files[0];
        if (!file) return;
        var name = file.name.toLowerCase();
        if (name.endsWith(".docx")) {
          update({ loadingMsg: "Reading your document\u2026" });
          var reader = new FileReader();
          reader.onload = function(fileEv) {
            var arrayBuffer = fileEv.target.result;
            var collectedImages = [];
            var imageIndex = 0;

            // Custom image converter: collect base64 and insert [IMAGE N] markers
            var options = {
              convertImage: mammoth.images.imgElement(function(image) {
                imageIndex++;
                var idx = imageIndex;
                return image.read("base64").then(function(base64Data) {
                  var ct = image.contentType || "image/png";
                  // Only keep supported image types, skip wmf/emf
                  if (ct === "image/png" || ct === "image/jpeg" || ct === "image/gif" || ct === "image/webp") {
                    collectedImages.push({ index: idx, media_type: ct, data: base64Data });
                  }
                  return { src: "[IMAGE_PLACEHOLDER_" + idx + "]" };
                });
              })
            };

            mammoth.convertToHtml({ arrayBuffer: arrayBuffer }, options)
              .then(function(result) {
                // Strip HTML tags, preserving image markers
                var text = result.value
                  .replace(/<img[^>]*src="\[IMAGE_PLACEHOLDER_(\d+)\]"[^>]*>/g, "\n[IMAGE $1]\n")
                  .replace(/<br\s*\/?>/gi, "\n")
                  .replace(/<\/p>/gi, "\n\n")
                  .replace(/<[^>]+>/g, "")
                  .replace(/&amp;/g, "&")
                  .replace(/&lt;/g, "<")
                  .replace(/&gt;/g, ">")
                  .replace(/&quot;/g, '"')
                  .replace(/&#39;/g, "'")
                  .replace(/&nbsp;/g, " ")
                  .replace(/\n{3,}/g, "\n\n")
                  .trim();

                // Cap images to avoid API limits
                var images = collectedImages.slice(0, MAX_JOURNAL_IMAGES);
                var imgNote = collectedImages.length > MAX_JOURNAL_IMAGES
                  ? " (" + (collectedImages.length - MAX_JOURNAL_IMAGES) + " additional images were not included due to size limits)"
                  : "";

                update({
                  journal: Object.assign({}, S.journal, { raw: text + imgNote }),
                  journalImages: images,
                  error: ""
                });
              })
              .catch(function(err) {
                update({ error: "Couldn\u2019t read that file. Try exporting from Google Docs as .docx and uploading again. (" + err.message + ")" });
              });
          };
          reader.readAsArrayBuffer(file);
        } else if (name.endsWith(".txt")) {
          var reader = new FileReader();
          reader.onload = function(e) {
            update({ journal: Object.assign({}, S.journal, { raw: e.target.result }), journalImages: [], error: "" });
          };
          reader.readAsText(file);
        } else {
          update({ error: "Please upload a .docx or .txt file. To use a Google Doc, go to File \u2192 Download \u2192 Microsoft Word (.docx)." });
        }
        // Reset the input so the same file can be re-uploaded
        ev.target.value = "";
      }

      // ── Journal parsing ──
      async function beginAssessment() {
        var journalText = S.journal.raw.trim();
        if (journalText) {
          pushHistory();
          var hasImages = S.journalImages && S.journalImages.length > 0;
          update({ phase: "loading", loadingMsg: hasImages ? "Reading your journal and images\u2026" : "Reading your journal\u2026" });
          try {
            var contextText = "Project: " + S.projectName + "\nDescription: " + S.projectDesc + "\n\nFull Journal:\n" + journalText;

            // Build multimodal message if images are present
            var context;
            if (hasImages) {
              var blocks = [{ type: "text", text: contextText }];
              S.journalImages.forEach(function(img) {
                blocks.push({
                  type: "text",
                  text: "\n[IMAGE " + img.index + " follows:]"
                });
                blocks.push({
                  type: "image",
                  source: { type: "base64", media_type: img.media_type, data: img.data }
                });
              });
              context = blocks;
            } else {
              context = contextText;
            }

            var raw = await callClaude(context, SYSTEM_JOURNAL_PARSE, 2000);
            var parsed = JSON.parse(raw.trim());
            // Pre-populate paste-in fields
            updateDim("desirability", { pasteIn: parsed.desirability.material || "" });
            updateDim("feasibility", { pasteIn: parsed.feasibility.material || "" });
            updateDim("viability", { pasteIn: parsed.viability.material || "" });
            // Store tool detection results
            var td = parsed.tools_detected || { unit_economics: { found: false }, tam_sam: { found: false }, financial_model: { found: false } };
            update({
              journal: { raw: journalText, parsed: parsed, provided: true },
              unitEconomicsDetected: !!(td.unit_economics && td.unit_economics.found),
              unitEconomicsContent: (td.unit_economics && td.unit_economics.content) || null,
              tamSamDetected: !!(td.tam_sam && td.tam_sam.found),
              tamSamContent: (td.tam_sam && td.tam_sam.content) || null,
              financialModelDetected: !!(td.financial_model && td.financial_model.found),
              financialModelContent: (td.financial_model && td.financial_model.content) || null,
              phase: "desirability",
              subPhase: "paste",
              error: ""
            });
          } catch (err) {
            update({ phase: "setup", error: "Had trouble parsing your journal. You can try again or skip it and paste notes manually in each section. (" + err.message + ")" });
          }
        } else {
          navigate("desirability", "paste");
        }
      }

      // ── Inline tool helpers ──
      function updateInline(tool, partial) {
        var current = Object.assign({}, S[tool]);
        Object.keys(partial).forEach(function(k) { current[k] = partial[k]; });
        var u = {};
        u[tool] = current;
        update(u);
      }

      var fmtUE = function(n) { return n >= 1000 ? "$" + (n / 1000).toFixed(0) + "k" : "$" + n; };

      // ── Viability detection gate ──
      function startViabilityFlow() {
        var pasteText = S.dimensions.viability.pasteIn || "";
        // Client-side detection on paste-in text (for no-journal case)
        var ueDetected = S.unitEconomicsDetected || pasteText.indexOf("ENDURE Unit Economics Analysis") !== -1;
        var tamDetected = S.tamSamDetected || pasteText.indexOf("ENDURE Market Sizing Analysis") !== -1;

        // If detected via paste but not via journal, store the content
        if (!S.unitEconomicsDetected && pasteText.indexOf("ENDURE Unit Economics Analysis") !== -1) {
          var ueStart = pasteText.indexOf("ENDURE Unit Economics Analysis");
          update({ unitEconomicsDetected: true, unitEconomicsContent: pasteText.substring(ueStart) });
        }
        if (!S.tamSamDetected && pasteText.indexOf("ENDURE Market Sizing Analysis") !== -1) {
          var tamStart = pasteText.indexOf("ENDURE Market Sizing Analysis");
          update({ tamSamDetected: true, tamSamContent: pasteText.substring(tamStart) });
        }
        if (!S.financialModelDetected && pasteText.indexOf("ENDURE Financial Model") !== -1) {
          var fmStart = pasteText.indexOf("ENDURE Financial Model");
          update({ financialModelDetected: true, financialModelContent: pasteText.substring(fmStart) });
        }

        pushHistory();
        if (ueDetected) {
          update({ phase: "viability", subPhase: "ue-review", error: "" });
        } else {
          startUeInlineInterview();
        }
      }

      // ── UE inline interview ──

          updateInline("ueInline", { questions: parsed.questions, qIndex: 0, answers: [], currentAnswer: "" });
          update({ phase: "viability", subPhase: "ue-interview", error: "" });
        } catch (err) {
          update({ phase: "viability", subPhase: "paste", error: "Something went wrong. (" + err.message + ")" });

      async function submitUeInlineAnswer() {
        var ue = S.ueInline;

      // ── Dimension question prompts lookup ──
      var questionPrompts = {
        desirability: SYSTEM_DESIRABILITY_QUESTIONS,
        feasibility: SYSTEM_FEASIBILITY_QUESTIONS,
        viability: SYSTEM_VIABILITY_QUESTIONS
      };
      var synthesisPrompts = {
        desirability: SYSTEM_DESIRABILITY_SYNTHESIS,
        feasibility: SYSTEM_FEASIBILITY_SYNTHESIS,
        viability: SYSTEM_VIABILITY_SYNTHESIS
      };

      // ── Start a dimension ──
      async function startDimension(dim) {
        var d = S.dimensions[dim];
        pushHistory();
        update({ phase: "loading", loadingMsg: "Generating " + DIMS[dim].label.toLowerCase() + " questions\u2026" });
        try {
          var context = "Project: " + S.projectName + "\nDescription: " + S.projectDesc;
          if (d.pasteIn.trim()) context += "\n\nStudent's notes:\n" + d.pasteIn;
          var raw = await callClaude(context, questionPrompts[dim], 800);
          var parsed = JSON.parse(raw.trim());
          updateDim(dim, { questions: parsed.questions, qIndex: 0, answers: [], currentAnswer: "" });
          update({ phase: dim, subPhase: "questions", error: "" });
        } catch (err) {
          update({ phase: dim, subPhase: "paste", error: "Something went wrong generating questions. Please try again. (" + err.message + ")" });
        }
      }

      // ── Submit interview answer ──
      async function submitAnswer(dim) {
        var d = S.dimensions[dim];
        var newAnswers = d.answers.concat([d.currentAnswer]);
        updateDim(dim, { answers: newAnswers, currentAnswer: "" });

        if (d.qIndex + 1 < d.questions.length) {
          updateDim(dim, { answers: newAnswers, currentAnswer: "", qIndex: d.qIndex + 1 });
        } else {
          // All questions answered — generate synthesis
          pushHistory();
          update({ phase: "loading", loadingMsg: "Synthesizing your " + DIMS[dim].label.toLowerCase() + " assessment\u2026" });
          try {
            var qa = d.questions.map(function(q, i) {
              return "Q" + (i + 1) + ": " + q.text + "\nA: " + newAnswers[i];
            }).join("\n\n");
            var context = "Project: " + S.projectName + "\nDescription: " + S.projectDesc;
            if (d.pasteIn.trim()) context += "\n\nStudent's notes:\n" + d.pasteIn;
            // Enrich viability context with UE/TAM data
            if (dim === "viability") {
              if (S.unitEconomicsResults) {
                context += "\n\nUnit Economics Data:\n" + buildUeInlinePlainText();
              } else if (S.unitEconomicsContent) {
                context += "\n\nUnit Economics Data:\n" + S.unitEconomicsContent;
              }
              if (S.tamSamResults) {
                context += "\n\nMarket Sizing Data:\n" + buildTamInlinePlainText();
              } else if (S.tamSamContent) {
                context += "\n\nMarket Sizing Data:\n" + S.tamSamContent;
              }
              if (S.financialModelContent) {
                context += "\n\nFinancial Model Data:\n" + S.financialModelContent;
              }
            }
            context += "\n\nInterview:\n" + qa;
            var raw = await callClaude(context, synthesisPrompts[dim], 1500);
            var parsed = JSON.parse(raw.trim());
            var assumptions = (parsed.assumptions || []).map(function(a) {
              return { id: a.id, text: a.text, certainty: null };
            });
            updateDim(dim, { answers: newAnswers, synthesis: parsed, assumptions: assumptions });
            update({ phase: dim, subPhase: "ai-synthesis", error: "" });
          } catch (err) {
            update({ phase: dim, subPhase: "questions", error: "Something went wrong. (" + err.message + ")" });
          }
        }
      }

      // ── Submit certainty and move to rating ──
      function setCertainty(dim, assumptionId, value) {
        var d = S.dimensions[dim];
        var updated = d.assumptions.map(function(a) {
          if (a.id === assumptionId) return Object.assign({}, a, { certainty: value });
          return a;
        });
        updateDim(dim, { assumptions: updated });
      }

      function allCertaintiesSet(dim) {
        return S.dimensions[dim].assumptions.every(function(a) { return a.certainty !== null; });
      }

      // ── Select rating ──
      function selectRating(dim, rating) {
        updateDim(dim, { rating: rating });
      }

      // ── Generate follow-ups after rating ──
      async function submitRating(dim) {
        var d = S.dimensions[dim];
        pushHistory();
        update({ phase: "loading", loadingMsg: "Preparing follow-up questions\u2026" });
        try {
          var ratingInfo = DIMS[dim].ratings[d.rating - 1];
          var assumptionSummary = d.assumptions.map(function(a) {
            return "- \"" + a.text + "\" \u2014 " + a.certainty + "% confident";
          }).join("\n");
          var context = "Dimension: " + DIMS[dim].label;
          context += "\nProject: " + S.projectName;
          context += "\n\nThe student rated their " + DIMS[dim].label.toLowerCase() + " as " + d.rating + " out of 3 (" + ratingInfo.label + ").";
          context += "\nRating description: " + ratingInfo.desc;
          context += "\n\nTheir assumption certainty ratings:\n" + assumptionSummary;
          context += "\n\nKey points from their interview:\n";
          d.questions.forEach(function(q, i) {
            context += "Q: " + q.text + "\nA: " + d.answers[i] + "\n\n";
          });
          var raw = await callClaude(context, SYSTEM_FOLLOWUP, 600);
          var parsed = JSON.parse(raw.trim());
          updateDim(dim, { followUpQuestions: parsed.questions, followUpIndex: 0, followUpAnswers: [], currentFollowUp: "" });
          update({ phase: dim, subPhase: "followups", error: "" });
        } catch (err) {
          update({ phase: dim, subPhase: "rating", error: "Something went wrong. (" + err.message + ")" });
        }
      }

      // ── Submit follow-up answer ──
      function submitFollowUp(dim) {
        var d = S.dimensions[dim];
        var newAnswers = d.followUpAnswers.concat([d.currentFollowUp]);
        updateDim(dim, { followUpAnswers: newAnswers, currentFollowUp: "" });

        if (d.followUpIndex + 1 < d.followUpQuestions.length) {
          updateDim(dim, { followUpAnswers: newAnswers, currentFollowUp: "", followUpIndex: d.followUpIndex + 1 });
        } else {
          // Dimension complete — move to next
          updateDim(dim, { followUpAnswers: newAnswers, currentFollowUp: "" });
          var idx = DIM_ORDER.indexOf(dim);
          if (idx + 1 < DIM_ORDER.length) {
            navigate(DIM_ORDER[idx + 1], "paste");
          } else {
            startSynthesis();
          }
        }
      }

      // ── Synthesis step ──
      async function startSynthesis() {
        pushHistory();
        update({ phase: "loading", loadingMsg: "Preparing synthesis questions\u2026" });
        try {
          var context = "Project: " + S.projectName + "\nDescription: " + S.projectDesc + "\n\n";
          DIM_ORDER.forEach(function(dim) {
            var d = S.dimensions[dim];
            var ratingInfo = DIMS[dim].ratings[d.rating - 1];
            context += "=== " + DIMS[dim].label.toUpperCase() + " ===\n";
            context += "Rating: " + d.rating + "/3 (" + ratingInfo.label + ")\n";
            if (d.synthesis) {
              context += "Key insight: " + (d.synthesis.synthesis || d.synthesis.unmet_need || "") + "\n";
            }
            context += "Assumptions:\n";
            d.assumptions.forEach(function(a) {
              context += "- \"" + a.text + "\" \u2014 " + a.certainty + "%\n";
            });
            context += "\n";
          });
          var raw = await callClaude(context, SYSTEM_SYNTHESIS_QUESTIONS, 800);
          var parsed = JSON.parse(raw.trim());
          update({ synthesisQuestions: parsed.questions, synthesisIndex: 0, synthesisAnswers: [], currentSynthesisAnswer: "", phase: "synthesis", subPhase: "questions", error: "" });

      function ratingDots(r) {
        if (r === 1) return "\u25CF\u25CB\u25CB";
        if (r === 2) return "\u25CF\u25CF\u25CB";
        return "\u25CF\u25CF\u25CF";
      }

      function getAllAssumptionsSorted() {
        var all = [];
        DIM_ORDER.forEach(function(dim) {
          S.dimensions[dim].assumptions.forEach(function(a) {
            all.push(Object.assign({}, a, { dim: dim }));
          });
        });
        all.sort(function(a, b) { return (a.certainty || 0) - (b.certainty || 0); });
        return all;
      }

      function getAvgCertainty() {
        var all = getAllAssumptionsSorted();
        if (all.length === 0) return 0;
        var sum = all.reduce(function(s, a) { return s + (a.certainty || 0); }, 0);
        return Math.round(sum / all.length);
      }

      function certClass(val) {
        if (val <= 20) return "cert-low";
        if (val <= 40) return "cert-mid";
        return "cert-high";
      }

      function copyToClipboard() {
        navigator.clipboard.writeText(buildPlainText()).then(function() {
          update({ copied: true });
          setTimeout(function() { update({ copied: false }); }, 2000);
        });
      }

        function heading(text, level) {
          return new D.Paragraph({
            heading: level === 1 ? D.HeadingLevel.HEADING_1 : D.HeadingLevel.HEADING_2,
            spacing: { before: level === 1 ? 0 : 300, after: 120 },
            children: [new D.TextRun({ text: text, bold: true, font: "Arial", size: level === 1 ? 36 : 28 })]
          });
        }
        function para(text, opts) {
          opts = opts || {};
          return new D.Paragraph({
            spacing: { after: opts.after !== undefined ? opts.after : 120 },
            children: [new D.TextRun({ text: text, font: "Arial", size: 22, italics: !!opts.italic, bold: !!opts.bold, color: opts.color })]
          });
        }
        function bullet(text) {
          return new D.Paragraph({
            bullet: { level: 0 },
            spacing: { after: 60 },
            children: [new D.TextRun({ text: text, font: "Arial", size: 22 })]
          });
        }
        function divider() {
          return new D.Paragraph({
            spacing: { before: 200, after: 200 },
            border: { bottom: { style: D.BorderStyle.SINGLE, size: 6, color: "999999" } },
            children: []
          });
        }
        function ratingLabel(dim) {
          var d = S.dimensions[dim];
          var info = DIMS[dim].ratings[d.rating - 1];
          return ratingDots(d.rating) + " " + info.label + " (" + d.rating + "/3)";
        }

        var children = [];
        children.push(heading("Venture Assessment Brief", 1));
        children.push(para(S.projectName, { bold: true, after: 40 }));

        slideTitle(s7, "What We\u2019re Certain and Uncertain About");

        s7.addText(avg + "%", { x: 0.6, y: 1.3, w: 3, h: 0.8, fontSize: 36, fontFace: "Arial", color: GOLD, bold: true });
        s7.addText("average confidence across " + allA.length + " assumptions", { x: 0.6, y: 2.0, w: 5, h: 0.4, fontSize: 11, fontFace: "Arial", color: MUTED });

        var highConf = allA.filter(function(a) { return a.certainty >= 60; });
        var lowConf = allA.filter(function(a) { return a.certainty < 60; });

        var aY = 2.7;
        if (highConf.length > 0) {
          s7.addText("HIGHER CONFIDENCE", { x: 0.6, y: aY, w: 5, h: 0.3, fontSize: 9, fontFace: "Arial", color: GREEN, letterSpacing: 2, bold: true });
          aY += 0.35;
          highConf.forEach(function(a) {
            s7.addText(a.certainty + "%  " + a.text, { x: 0.6, y: aY, w: 6, h: 0.35, fontSize: 11, fontFace: "Arial", color: CREAM });
            s7.addText(DIMS[a.dim].label, { x: 6.8, y: aY, w: 2, h: 0.35, fontSize: 9, fontFace: "Arial", color: MUTED, italic: true });
            aY += 0.4;
          });
          aY += 0.2;
        }
        if (lowConf.length > 0) {
          s7.addText("LOWER CONFIDENCE", { x: 0.6, y: aY, w: 5, h: 0.3, fontSize: 9, fontFace: "Arial", color: RED, letterSpacing: 2, bold: true });
          aY += 0.35;
          lowConf.forEach(function(a) {
            s7.addText(a.certainty + "%  " + a.text, { x: 0.6, y: aY, w: 6, h: 0.35, fontSize: 11, fontFace: "Arial", color: CREAM });
            s7.addText(DIMS[a.dim].label, { x: 6.8, y: aY, w: 2, h: 0.35, fontSize: 9, fontFace: "Arial", color: MUTED, italic: true });
            aY += 0.4;
          });
        }
        s7.notes = "Walk through your highest and lowest confidence assumptions. Explain why the low-confidence ones matter \u2014 are they critical to your venture or manageable risks?";

        // ── SLIDE 8: The Honest Bet ──
        var s8 = addSlide();
        slideTitle(s8, "The Honest Bet");
        s8.addText("Will this venture exist in two years?", {
          x: 0.6, y: 1.5, w: 11.8, h: 0.6,
          fontSize: 16, fontFace: "Arial", color: MUTED, italic: true
        });
        if (b.synthesis && b.synthesis.survival_estimate) {
          s8.addText(b.synthesis.survival_estimate, {
            x: 0.6, y: 2.4, w: 11.8, h: 3.5,
            fontSize: 16, fontFace: "Arial", color: CREAM, lineSpacingMultiple: 1.6, valign: "top"
          });
        }
        s8.notes = "Share your honest probability estimate. Explain what would change it \u2014 up or down. This is the superforecasting capstone.";

        // ── SLIDE 9: What We'd Do Next ──
        var s9 = addSlide();
        slideTitle(s9, "What We\u2019d Do Next");
        s9.addText("If we had another semester, here\u2019s where we\u2019d focus:", {
          x: 0.6, y: 1.3, w: 11.8, h: 0.5,
          fontSize: 13, fontFace: "Arial", color: MUTED, italic: true
        });
        var nextY = 2.1;
        (b.next_steps || []).forEach(function(step, i) {
          s9.addText((i + 1) + ".", { x: 0.6, y: nextY, w: 0.5, h: 0.6, fontSize: 18, fontFace: "Arial", color: GOLD, bold: true, valign: "top" });
          s9.addText(step, { x: 1.2, y: nextY, w: 11, h: 0.8, fontSize: 14, fontFace: "Arial", color: CREAM, lineSpacingMultiple: 1.4, valign: "top" });
          nextY += 1.1;
        });
        // Closing thought from synthesis
        if (b.synthesis && b.synthesis.student_reflection) {
          s9.addShape(pptx.ShapeType.rect, { x: 0.6, y: nextY + 0.2, w: 11.8, h: 0.02, fill: { color: MUTED } });
          s9.addText(b.synthesis.student_reflection.substring(0, 400), {
            x: 0.6, y: nextY + 0.5, w: 11.8, h: 2,
            fontSize: 12, fontFace: "Arial", color: MUTED, italic: true, lineSpacingMultiple: 1.5, valign: "top"
          });
        }
        s9.notes = "Present your next experiments. Frame them as the most valuable things you could learn to reduce your biggest uncertainties.";

        // Download
        var slug = S.projectName.replace(/[^a-zA-Z0-9]+/g, "-").replace(/^-|-$/g, "").toLowerCase();
        pptx.writeFile({ fileName: "venture-assessment-" + slug + ".pptx" });
      }

      function currentStepIndex() {
        var p = S.phase;
        if (p === "setup" || p === "loading") {
          // Determine which step is active based on what's complete
          if (S.dimensions.viability.followUpAnswers.length > 0) return 3;
          if (S.dimensions.feasibility.followUpAnswers.length > 0) return 2;
          if (S.dimensions.desirability.followUpAnswers.length > 0) return 1;
          return 0;
        }
        var idx = DIM_ORDER.indexOf(p);
        if (idx >= 0) return idx;
        if (p === "synthesis") return 3;
        if (p === "concept-revision") return 4;
        if (p === "brief") return 5;
        return 0;
      }

          if (i < active) cls += " done";

          items.push(e("span", { key: "s" + i, className: cls }, label));
        });
        return e("div", { className: "step-bar no-print" }, items);

      // ═══════════════════════════════════════
      // RENDER: DIMENSION (dispatches on subPhase)
      // ═══════════════════════════════════════
      function renderDimension(dim) {
        var cfg = DIMS[dim];
        var d = S.dimensions[dim];
        var sub = S.subPhase;

        // Viability sub-phase routing for inline tools
        if (dim === "viability") {
          if (sub === "ue-review") return renderUeReview();
          if (sub === "ue-interview") return renderUeInlineInterview();
          if (sub === "ue-results") return renderUeResults();
          if (sub === "tam-review") return renderTamReview();
          if (sub === "tam-interview") return renderTamInlineInterview();
          if (sub === "tam-results") return renderTamResults();
          if (sub === "fm-review") return renderFmReview();
        }

        if (sub === "paste") return renderPaste(dim, cfg, d);
        if (sub === "questions") return renderQuestions(dim, cfg, d);
        if (sub === "ai-synthesis") return renderSynthesisDisplay(dim, cfg, d);
        if (sub === "assumption-certainty") return renderAssumptionCertainty(dim, cfg, d);
        if (sub === "rating") return renderRating(dim, cfg, d);
        if (sub === "followups") return renderFollowUps(dim, cfg, d);
        return renderPaste(dim, cfg, d);
      }

          cards.push(e("div", { key: "need", className: "unmet-need" }, syn.unmet_need));
        }
        // Design implications (desirability)
        if (syn.design_implications) {

                ) : null,
                e("div", { className: "gaps-text" }, "Gaps: " + b.viability.gaps),
                e("div", { className: "gaps-text" }, "Top uncertainty: " + b.viability.top_uncertainty)
              )
            ),

            // Integrated Assessment
            e("div", { className: "page-break" }),
            e("div", { className: "brief-section" },
              e("div", { className: "brief-section-title" }, "Integrated Assessment"),
              e("div", { className: "brief-card" },
                e("div", { className: "brief-text" }, b.synthesis.student_reflection)
              ),
              b.synthesis.tensions ? e("div", { className: "brief-card" },
                e("div", { className: "synthesis-label" }, "Tensions"),
                e("div", { className: "brief-text" }, b.synthesis.tensions)
              ) : null,
              b.synthesis.reinforcements ? e("div", { className: "brief-card" },
                e("div", { className: "synthesis-label" }, "Reinforcements"),
                e("div", { className: "brief-text" }, b.synthesis.reinforcements)
              ) : null,
              e("div", { className: "brief-card" },
                e("div", { className: "synthesis-label" }, "Two-Year Survival Estimate"),
                e("div", { className: "brief-text" }, b.synthesis.survival_estimate)
              )
            ),

            // Uncertainty Map
            e("div", { className: "brief-section" },
              e("div", { className: "brief-section-title" }, "Uncertainty Map"),
              e("div", { className: "brief-card" },
                e("div", { className: "avg-confidence" }, avg + "%"),
                e("div", { className: "avg-label" }, "Average confidence across " + allA.length + " assumptions"),
                allA.map(function(a, i) {
                  return e("div", { key: i, className: "uncertainty-item" },
                    e("span", { className: "uncertainty-cert " + certClass(a.certainty) }, a.certainty + "%"),
                    e("span", { className: "uncertainty-text" }, a.text),
                    e("span", { className: "uncertainty-dim" }, DIMS[a.dim].label)
                  );
                }),
                b.uncertainty_map && b.uncertainty_map.commentary ? e("div", { className: "brief-text", style: { marginTop: 16, paddingTop: 16, borderTop: "1px solid rgba(232,227,216,0.06)" } },
                  b.uncertainty_map.commentary
                ) : null
              )
            ),

            // Theoretical Foundations
            b.theoretical_foundations ? e("div", { className: "brief-section" },
              e("div", { className: "brief-section-title" }, "Theoretical Foundations"),
              e("div", { className: "brief-card" },
                b.theoretical_foundations.desirability ? e("div", null,
                  e("div", { className: "synthesis-label", style: { marginBottom: 6 } }, "Desirability"),
                  e("div", { className: "brief-text", style: { marginBottom: 16 } }, b.theoretical_foundations.desirability)
                ) : null,
                b.theoretical_foundations.feasibility ? e("div", null,
                  e("div", { className: "synthesis-label", style: { marginBottom: 6 } }, "Feasibility"),
                  e("div", { className: "brief-text", style: { marginBottom: 16 } }, b.theoretical_foundations.feasibility)
                ) : null,
                b.theoretical_foundations.viability ? e("div", null,
                  e("div", { className: "synthesis-label", style: { marginBottom: 6 } }, "Viability"),
                  e("div", { className: "brief-text" }, b.theoretical_foundations.viability)
                ) : null
              )
            ) : null,

            // Next Steps
            e("div", { className: "brief-section" },
              e("div", { className: "brief-section-title" }, "Recommended Next Steps"),
              e("div", { className: "brief-card" },
                (b.next_steps || []).map(function(step, i) {
                  return e("div", { key: i, style: { display: "flex", gap: 12, marginBottom: i < (b.next_steps.length - 1) ? 12 : 0 } },
                    e("span", { style: { fontFamily: "'IBM Plex Mono', monospace", fontSize: 14, fontWeight: 600, color: "#D4A853" } }, (i + 1) + "."),
                    e("span", { className: "brief-text" }, step)
                  );
                })
              )
            ),

            // Footer
            e("div", { style: { fontSize: 12, color: "rgba(232,227,216,0.25)", textAlign: "center", marginTop: 40, paddingTop: 20, borderTop: "1px solid rgba(232,227,216,0.06)" } },
              "Generated with ENDURE Venture Assessment Tool \u00B7 " +
              new Date().toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" }),
              e("br"),
              "This assessment reflects the student\u2019s reasoning and evidence as of this date."
            ),

            // Actions
            e("div", { className: "actions no-print", style: { marginTop: 32 } },
              e("button", { className: "btn", onClick: downloadDocx }, "Download Brief"),
              e("button", { className: "btn", onClick: generatePPTX }, "Download Deck"),
              e("button", {
                className: "btn btn-ghost btn-copy" + (S.copied ? " copied" : ""),
                onClick: copyToClipboard
              }, S.copied ? "Copied!" : "Copy Text"),
              e("button", { className: "btn btn-ghost", onClick: function() { window.print(); } }, "Print"),
              e("button", { className: "btn btn-ghost", onClick: startFresh }, "Start Over")
            )
          )
        );
      }

      // ═══════════════════════════════════════
      // MAIN RENDER
      // ═══════════════════════════════════════
      if (S.phase === "loading") return renderLoading();
      if (S.phase === "setup") return renderSetup();
      if (S.phase === "brief") return renderBrief();
      if (S.phase === "concept-revision") return renderConceptRevision();
      if (S.phase === "synthesis") return renderSynthesis();
      if (DIM_ORDER.indexOf(S.phase) >= 0) return renderDimension(S.phase);
      return renderSetup();
    }

    var root = ReactDOM.createRoot(document.getElementById("app"));
    root.render(e(App));
  </script>
</body>
</html>
