              vd.marketing_annual.entry_mode === "monthly"
                ? e("div", { className: "grid-preview" },
                    "Annual: " + fmtUSD(vd.marketing_annual.y1) + "  ·  " + fmtUSD(vd.marketing_annual.y2) + "  ·  " + fmtUSD(vd.marketing_annual.y3)
                  )
                : null,
              growthBlock("marketing_annual", vd.marketing_annual),
              certPills("marketing_annual")
            ),

            // Variable overhead %
            e("div", { className: "grid-card" },
              e("div", { className: "grid-header" },
                e("div", { className: "grid-label" }, "Variable Overhead %")
              ),
              e("div", { className: "grid-prompt" }, "Payment processing, small supplies, variable shipping surcharges — costs that scale with revenue. A common rule-of-thumb is 3–7%. Defaults to 5%."),
              e("div", { style: { display: "flex", alignItems: "center", gap: 10, maxWidth: 200 } },
                e("input", {
                  className: "grid-input",
                  type: "number",
                  min: "0",
                  max: "100",
                  step: "0.5",
                  value: (vd.variable_overhead_pct * 100).toString(),
                  onChange: function(ev) { setVariableOverheadPct(ev.target.value); }
                }),
                e("span", { style: { fontFamily: "'IBM Plex Mono', monospace", fontSize: 14, color: "rgba(232,227,216,0.5)" } }, "%")
              ),
              certPills("variable_overhead_pct")
            ),

            // ── Reality Layer ──
            renderRealityLayer(),

            S.error ? e("div", { className: "error-msg" }, S.error) : null,
            e("button", {
              className: "btn",
              disabled: !(varFormReady() && allVarCertaintiesSet()),
              onClick: generateBrief,
              style: { marginTop: 18 }
            }, "Run the Model →")
          )
        );
      }

      // ═══════════════════════════════════════
      // RENDER: REALITY LAYER (shared: Phase 2 + live brief)
      // ═══════════════════════════════════════
      function renderRealityLayer() {
        var r = S.realityLayer;
        function toggle(key, label) {
          return e("label", {
            style: { display: "flex", gap: 10, alignItems: "center", fontSize: 13, color: "rgba(232,227,216,0.7)", cursor: "pointer", marginBottom: 8 }
          },
            e("input", {
              type: "checkbox",
              checked: !!r[key],
              onChange: function() { toggleReality(key); },
              style: { accentColor: "#D4A853" }
            }),
            label
          );
        }
        function numInput(key, suffix, step) {
          return e("div", { style: { display: "flex", alignItems: "center", gap: 8, marginLeft: 28, marginBottom: 12, maxWidth: 220 } },
            e("input", {
              className: "grid-input",
              type: "number",
              min: "0",
              step: step || "any",
              value: typeof r[key] === "number" ? String(r[key]) : "",
              onChange: function(ev) {
                var v = parseFloat(ev.target.value) || 0;
                var partial = {};
                partial[key] = v;
                updateRealityLayer(partial);
              }
            }),
            e("span", { style: { fontFamily: "'IBM Plex Mono', monospace", fontSize: 13, color: "rgba(232,227,216,0.5)" } }, suffix)
          );
        }
        function pctInput(key) {
          return e("div", { style: { display: "flex", alignItems: "center", gap: 8, marginLeft: 28, marginBottom: 12, maxWidth: 220 } },
            e("input", {
              className: "grid-input",
              type: "number",
              min: "0",
              max: "100",
              step: "0.5",
              value: (r[key] * 100).toString(),
              onChange: function(ev) {
                var v = parseFloat(ev.target.value) || 0;
                var partial = {};
                partial[key] = v / 100;
                updateRealityLayer(partial);
              }
            }),
            e("span", { style: { fontFamily: "'IBM Plex Mono', monospace", fontSize: 13, color: "rgba(232,227,216,0.5)" } }, "%")
          );
        }

        return e("div", { className: "grid-card", style: { borderStyle: "dashed" } },
          e("div", { className: "grid-header" },
            e("div", { className: "grid-label" }, "Reality Layer — Optional")
          ),
          e("div", { className: "grid-prompt" },
            "Our P&L deliberately leaves out a few things. Turn any of these on if you want the narrative to reference them — the numbers and rules-of-thumb are suggestions, not prescriptions. Taxes are the only item that actually changes the math (adds a post-tax row)."
          ),

          // Taxes
          toggle("tax_enabled", e("span", null,
            e("strong", null, "Taxes. "),
            "Early-stage businesses typically see combined federal, state, and self-employment rates of ",
            e("strong", null, "20–35%"),
            " on positive profit. Default: 25%."
          )),
          r.tax_enabled ? pctInput("tax_rate") : null,

          // Working capital
          toggle("wc_enabled", e("span", null,
            e("strong", null, "Working capital. "),
            "Inventory, receivables, and supplier prepayments tie up cash you can't spend. Common rule: ",
            e("strong", null, "10–20%"),
            " of annual revenue sits in working capital. Informational only — doesn't change the P&L."
          )),
          r.wc_enabled ? pctInput("wc_pct") : null,

          // Founder market salary
          toggle("founder_market_enabled", e("span", null,
            e("strong", null, "Founder market salary. "),
            "If you're not paying yourself a market rate, the honest gap is what you'd earn elsewhere. Typical entry-level PM/engineer/ops roles in your area: ",
            e("strong", null, "$55–85K"),
            "."
          )),
          r.founder_market_enabled ? numInput("founder_market_annual", "$/yr", "1000") : null,

          // Competitive price pressure
          toggle("price_pressure_enabled", e("span", null,
            e("strong", null, "Competitive price pressure. "),
            "Once competitors notice, prices erode. A reasonable first-pass assumption is ",
            e("strong", null, "3–8% annual price decay"),
            " in Y2 and Y3. Informational only — your sale-price line above already owns the actual numbers."
          )),
          r.price_pressure_enabled ? pctInput("price_pressure_pct") : null
        );
      }

      // ═══════════════════════════════════════
      // RENDER: BRIEF
      // ═══════════════════════════════════════
      function renderBrief() {
        if (!S.brief) return renderLoading();
        // Recompute the model on every render from the current (possibly edited) inputs.
        // The stored S.brief narration may be stale — we render a badge when it is.
        var liveModel = computeModel(S.upstream, S.fixedCosts, S.variableData, S.realityLayer);
        var m = liveModel.rows;
        var vd = S.variableData;
        var currentHash = computeInputsHash(S.fixedCosts, S.variableData, S.upstream, S.realityLayer);
        var isStale = S.briefHash && currentHash !== S.briefHash;

        function row(label, vals, cls) {
          cls = cls || "";
          return e("tr", { className: cls },
            e("td", null, label),
            e("td", { className: vals[0] < 0 ? "neg" : "" }, fmtUSD(vals[0])),
            e("td", { className: vals[1] < 0 ? "neg" : "" }, fmtUSD(vals[1])),
            e("td", { className: vals[2] < 0 ? "neg" : "" }, fmtUSD(vals[2]))
          );
        }

        return e("div", null,
          renderHeader(),
          e("main", { className: "main" },
            renderStepBar(),

            // Header
            e("div", { className: "brief-header" },
              e("div", { className: "eyebrow" }, S.projectName),
              e("div", { className: "brief-title" }, "Financial Model Brief"),
              e("div", { className: "brief-meta" }, "Generated " + todayStr())
            ),

            // Model table
            e("div", { className: "brief-section" },
              e("div", { className: "brief-section-title" }, "3-Year Model"),
              e("div", { className: "model-table-wrap" },
                e("table", { className: "model-table" },
                  e("thead", null, e("tr", null,
                    e("th", null, ""),
                    e("th", null, "Year 1"),
                    e("th", null, "Year 2"),
                    e("th", null, "Year 3")
                  )),
                  e("tbody", null,
                    row("Revenue", [m.revenue.y1, m.revenue.y2, m.revenue.y3]),
                    row("– COGS", [m.cogs.y1, m.cogs.y2, m.cogs.y3]),
                    row("= Gross profit", [m.gross.y1, m.gross.y2, m.gross.y3], "model-subtotal"),
                    row("– Fixed costs", [m.fixed.y1, m.fixed.y2, m.fixed.y3]),
                    row("– Variable overhead", [m.variable.y1, m.variable.y2, m.variable.y3]),
                    row(S.realityLayer.tax_enabled ? "= Operating (pre-tax)" : "= Operating result", [m.operating.y1, m.operating.y2, m.operating.y3], S.realityLayer.tax_enabled ? "model-subtotal" : "model-total"),
                    S.realityLayer.tax_enabled ? row("– Taxes (" + (S.realityLayer.tax_rate * 100).toFixed(0) + "%)", [m.taxes.y1, m.taxes.y2, m.taxes.y3]) : null,
                    S.realityLayer.tax_enabled ? row("= Operating (post-tax)", [m.post_tax.y1, m.post_tax.y2, m.post_tax.y3], "model-total") : null
                  )
                )
              )
            ),

            // Reading the model
            e("div", { className: "brief-section" },
              e("div", { className: "brief-section-title" }, "Reading the Model"),
              e("div", { className: "brief-card" },
                e("div", { className: "brief-sub" }, "Breakeven"),
                e("div", { className: "brief-text" }, S.brief.breakeven),
                e("div", { className: "brief-sub" }, "Biggest Line Item"),
                e("div", { className: "brief-text" }, S.brief.biggest_line_item),
                e("div", { className: "brief-sub" }, "Most Sensitive Assumption"),
                e("div", { className: "brief-text" }, S.brief.most_sensitive)
              )
            ),

            // Upstream cross-check — connects Tool 1/2 decisions to this model
            S.brief.upstream_check ? e("div", { className: "brief-section" },
              e("div", { className: "brief-section-title" }, "Cross-check with Tools 1 & 2"),
              e("div", { className: "brief-card" },
                e("div", { className: "brief-text" }, S.brief.upstream_check)
              )
            ) : null,

            // Reality Layer notes (only if the narrator produced non-empty content)
            S.brief.reality_notes && S.brief.reality_notes.trim() ? e("div", { className: "brief-section" },
              e("div", { className: "brief-section-title" }, "Reality Layer"),
              e("div", { className: "brief-card" },
                e("div", { className: "brief-text" }, S.brief.reality_notes)
              )
            ) : null,

            // Editable assumptions ledger — change numbers here and the table above
            // re-renders live. The narration doesn't — a stale badge appears and the
            // student can re-run narration or reset to their original submission.
            e("div", { className: "brief-section no-print" },
              e("div", { className: "brief-section-title" }, "Live Assumptions — edit and see the model update"),
              e("div", { className: "brief-edit-bar" },
                isStale ? e("div", { className: "stale-badge" }, "Narration out of date") : null,
                isStale ? e("button", {
                  className: "btn",
                  disabled: S.regenerating,
                  onClick: rerunBrief,
                  style: { padding: "10px 18px", fontSize: 11 }
                }, S.regenerating ? "Re-running…" : "Re-run Narration") : null,
                S.briefSnapshot && isStale ? e("button", {
                  className: "btn btn-ghost",
                  onClick: resetToSnapshot,
                  style: { padding: "10px 18px", fontSize: 11 }
                }, "Reset to Original") : null
              ),
              // Fixed cost lines
              S.fixedCosts.map(function(fc) {
                function dispFor(year) {
                  var ann = fc[year] || 0;
                  if (!ann) return "";
                  return fc.entry_mode === "monthly" ? String(Math.round(ann / 12 * 100) / 100) : String(Math.round(ann * 100) / 100);
                }
                return e("div", { key: fc.id, className: "grid-card" },
                  e("div", { className: "grid-header" },
                    e("div", { className: "grid-label" }, fc.label + (fc.is_implied ? " · opportunity cost" : "")),
                    e("div", { style: { display: "flex", gap: 10, alignItems: "center" } },
                      e("div", { className: "entry-toggle" },
                        e("button", {
                          className: fc.entry_mode === "monthly" ? "active" : "",
                          onClick: function() { if (fc.entry_mode !== "monthly") toggleFixedEntryMode(fc.id); }
                        }, "Mo"),
                        e("button", {
                          className: fc.entry_mode === "annual" ? "active" : "",
                          onClick: function() { if (fc.entry_mode !== "annual") toggleFixedEntryMode(fc.id); }
                        }, "Yr")
                      ),
                      e("div", { className: "certainty-pills" },
                        [1, 2, 3].map(function(val) {
                          return e("button", {
                            key: val,
                            className: "certainty-pill" + (S.certainty[fc.id] === val ? " selected" : ""),
                            onClick: function() { setCertainty(fc.id, val); }
                          }, certLabel(val));
                        })
                      )
                    )
                  ),
                  e("div", { className: "grid-row" },
                    e("div", { className: "grid-row-head" }, fc.entry_mode === "monthly" ? "$/mo" : "$/yr"),
                    ["y1", "y2", "y3"].map(function(y, i) {
                      return e("input", {
                        key: y,
                        className: "grid-input",
                        type: "number",
                        min: "0",
                        step: "any",
                        placeholder: "Y" + (i + 1),
                        value: dispFor(y),
                        onChange: function(ev) { setFixedYearValue(fc.id, y, ev.target.value); }
                      });
                    })
                  ),
                  fc.entry_mode === "monthly"
                    ? e("div", { className: "grid-preview" },
                        "Annual: " + fmtUSD(fc.y1) + "  ·  " + fmtUSD(fc.y2) + "  ·  " + fmtUSD(fc.y3)
                      )
                    : null
                );
              }),

              // Volume
              e("div", { className: "grid-card" },
                e("div", { className: "grid-header" },
                  e("div", { className: "grid-label" }, "Unit Volume"),
                  e("div", { className: "certainty-pills" },
                    [1, 2, 3].map(function(val) {
                      return e("button", {
                        key: val,
                        className: "certainty-pill" + (S.certainty.volume === val ? " selected" : ""),
                        onClick: function() { setCertainty("volume", val); }
                      }, certLabel(val));
                    })
                  )
                ),
                e("div", { className: "grid-row" },
                  e("div", { className: "grid-row-head" }, "units"),
                  ["y1", "y2", "y3"].map(function(y, i) {
                    return e("input", {
                      key: y,
                      className: "grid-input",
                      type: "number",
                      min: "0",
                      step: "1",
                      placeholder: "Y" + (i + 1),
                      value: vd.volume[y] || "",
                      onChange: function(ev) { setVolumeYearValue(y, ev.target.value); }
                    });
                  })
                )
              ),

              // Sale price
              e("div", { className: "grid-card" },
                e("div", { className: "grid-header" },
                  e("div", { className: "grid-label" }, "Sale Price"),
                  e("div", { className: "certainty-pills" },
                    [1, 2, 3].map(function(val) {
                      return e("button", {
                        key: val,
                        className: "certainty-pill" + (S.certainty.sale_price === val ? " selected" : ""),
                        onClick: function() { setCertainty("sale_price", val); }
                      }, certLabel(val));
                    })
                  )
                ),
                e("div", { className: "grid-row" },
                  e("div", { className: "grid-row-head" }, "$/unit"),
                  ["y1", "y2", "y3"].map(function(y, i) {
                    return e("input", {
                      key: y,
                      className: "grid-input",
                      type: "number",
                      min: "0",
                      step: "any",
                      placeholder: "Y" + (i + 1),
                      value: vd.sale_price[y] || "",
                      onChange: function(ev) { setPriceYearValue(y, ev.target.value); }
                    });
                  })
                )
              ),

              // Marketing
              e("div", { className: "grid-card" },
                e("div", { className: "grid-header" },
                  e("div", { className: "grid-label" }, "Marketing"),
                  e("div", { style: { display: "flex", gap: 10, alignItems: "center" } },
                    e("div", { className: "entry-toggle" },
                      e("button", {
                        className: vd.marketing_annual.entry_mode === "monthly" ? "active" : "",
                        onClick: function() { if (vd.marketing_annual.entry_mode !== "monthly") toggleMarketingEntryMode(); }
                      }, "Mo"),
                      e("button", {
                        className: vd.marketing_annual.entry_mode === "annual" ? "active" : "",
                        onClick: function() { if (vd.marketing_annual.entry_mode !== "annual") toggleMarketingEntryMode(); }
                      }, "Yr")
                    ),
                    e("div", { className: "certainty-pills" },
                      [1, 2, 3].map(function(val) {
                        return e("button", {
                          key: val,
                          className: "certainty-pill" + (S.certainty.marketing_annual === val ? " selected" : ""),
                          onClick: function() { setCertainty("marketing_annual", val); }
                        }, certLabel(val));
                      })
                    )
                  )
                ),
                e("div", { className: "grid-row" },
                  e("div", { className: "grid-row-head" }, vd.marketing_annual.entry_mode === "monthly" ? "$/mo" : "$/yr"),
                  ["y1", "y2", "y3"].map(function(y, i) {
                    var ann = vd.marketing_annual[y] || 0;
                    var disp = !ann ? "" : (vd.marketing_annual.entry_mode === "monthly" ? String(Math.round(ann / 12 * 100) / 100) : String(Math.round(ann * 100) / 100));
                    return e("input", {
                      key: y,
                      className: "grid-input",
                      type: "number",
                      min: "0",
                      step: "any",
                      placeholder: "Y" + (i + 1),
                      value: disp,
                      onChange: function(ev) { setMarketingYearValue(y, ev.target.value); }
                    });
                  })
                ),
                vd.marketing_annual.entry_mode === "monthly"
                  ? e("div", { className: "grid-preview" },
                      "Annual: " + fmtUSD(vd.marketing_annual.y1) + "  ·  " + fmtUSD(vd.marketing_annual.y2) + "  ·  " + fmtUSD(vd.marketing_annual.y3)
                    )
                  : null
              ),

              // Variable overhead %
              e("div", { className: "grid-card" },
                e("div", { className: "grid-header" },
                  e("div", { className: "grid-label" }, "Variable Overhead %"),
                  e("div", { className: "certainty-pills" },
                    [1, 2, 3].map(function(val) {
                      return e("button", {
                        key: val,
                        className: "certainty-pill" + (S.certainty.variable_overhead_pct === val ? " selected" : ""),
                        onClick: function() { setCertainty("variable_overhead_pct", val); }
                      }, certLabel(val));
                    })
                  )
                ),
                e("div", { style: { display: "flex", alignItems: "center", gap: 10, maxWidth: 200 } },
                  e("input", {
                    className: "grid-input",
                    type: "number",
                    min: "0",
                    max: "100",
                    step: "0.5",
                    value: (vd.variable_overhead_pct * 100).toString(),
                    onChange: function(ev) { setVariableOverheadPct(ev.target.value); }
                  }),
                  e("span", { style: { fontFamily: "'IBM Plex Mono', monospace", fontSize: 14, color: "rgba(232,227,216,0.5)" } }, "%")
                )
              ),

              // Reality Layer editor (shared component)
              renderRealityLayer()
            ),

            // Top three
            e("div", { className: "brief-section" },
              e("div", { className: "brief-section-title" }, "Top Three to Pressure-Test"),
              S.brief.top_three.map(function(t, i) {
                return e("div", { key: i, className: "pressure-item" },
                  e("div", { className: "pressure-rank" }, "#" + (i + 1) + " · " + certLabel(t.certainty)),
                  e("div", { className: "pressure-assumption" }, t.assumption),
                  e("div", { className: "pressure-why" },
                    e("strong", null, "Why it matters"), t.why_it_matters
                  ),
                  e("div", { className: "pressure-evidence" },
                    e("strong", null, "Evidence needed"), t.evidence_needed
                  )
                );
              })
            ),

            // Honest gaps
            e("div", { className: "brief-section" },
              e("div", { className: "brief-section-title" }, "Honest Gaps"),
              e("div", { className: "brief-card" },
                e("div", { className: "brief-text" }, S.brief.honest_gaps)
              )
            ),

            // Actions
            e("div", { className: "actions no-print" },
              e("button", { className: "btn", onClick: function() { window.print(); } }, "Print / Save PDF"),
              e("button", { className: "btn", onClick: downloadDocx }, "Download Word Doc"),
              e("button", {
                className: "btn btn-ghost btn-copy" + (S.copied ? " copied" : ""),
                onClick: copyToClipboard
              }, S.copied ? "Copied!" : "Copy Text"),
              e("button", { className: "btn btn-ghost", onClick: reset }, "New Model")
            )
          )
        );
      }

      // ═══════════════════════════════════════
      // DISPATCH
      // ═══════════════════════════════════════
      if (S.phase === "loading") return renderLoading();
      if (S.phase === "setup") return renderSetup();
      if (S.phase === "ue-inline-start") return renderUeInlineStart();
      if (S.phase === "ue-inline-interview") return renderUeInlineInterview();
      if (S.phase === "tam-inline-start") return renderTamInlineStart();
      if (S.phase === "tam-inline-interview") return renderTamInlineInterview();
      if (S.phase === "upstream-review") return renderUpstreamReview();
      if (S.phase === "fixed-form") return renderFixedForm();
      if (S.phase === "var-form") return renderVarForm();
      if (S.phase === "brief") return renderBrief();
      return renderSetup();
    }

    var root = ReactDOM.createRoot(document.getElementById("app"));
    root.render(e(App));
  </script>
</body>
</html>
