<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ENDURE · Financial Model</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0D1117;
      color: #E8E3D8;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.6;
    }

    .header {
      border-bottom: 1px solid rgba(212,168,83,0.18);
      padding: 18px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo-mark {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 20px;
      font-weight: 600;
      color: #D4A853;
      letter-spacing: -1px;
    }
    .header-sub {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 300;
      color: rgba(232,227,216,0.4);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .main {
      max-width: 740px;
      margin: 0 auto;
      padding: 32px 40px 80px;
    }

    /* ── STEP INDICATOR ── */
    .step-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }
    .step-pill {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid rgba(232,227,216,0.08);
      color: rgba(232,227,216,0.25);
      transition: all 0.2s;
      white-space: nowrap;
    }
    .step-pill.active {
      border-color: rgba(212,168,83,0.5);
      color: #D4A853;
      background: rgba(212,168,83,0.08);
    }
    .step-pill.done {
      border-color: rgba(92,184,138,0.3);
      color: rgba(92,184,138,0.6);
    }

    /* ── TYPOGRAPHY ── */
    .eyebrow {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #D4A853;
      margin-bottom: 18px;
    }
    .intro-heading {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      line-height: 1.1;
      font-weight: 400;
      color: #E8E3D8;
      margin-bottom: 22px;
    }
    .intro-body {
      font-size: 15px;
      color: rgba(232,227,216,0.55);
      max-width: 560px;
      line-height: 1.75;
      margin-bottom: 40px;
    }
    .section-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(212,168,83,0.6);
      margin-bottom: 16px;
    }
    .dim-heading {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      line-height: 1.2;
      font-weight: 400;
      color: #E8E3D8;
      margin-bottom: 10px;
    }
    .dim-body {
      font-size: 14px;
      color: rgba(232,227,216,0.45);
      line-height: 1.7;
      margin-bottom: 32px;
      max-width: 560px;
    }

    /* ── CARDS & FORMS ── */
    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(232,227,216,0.08);
      border-radius: 8px;
      padding: 32px;
      margin-bottom: 32px;
    }
    .form-group { margin-bottom: 24px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-label {
      display: block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(212,168,83,0.75);
      margin-bottom: 8px;
    }
    .form-hint {
      font-size: 12px;
      color: rgba(232,227,216,0.35);
      margin-bottom: 8px;
      font-style: italic;
    }
    .form-input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(232,227,216,0.1);
      border-radius: 4px;
      color: #E8E3D8;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }
    .form-input:focus { border-color: rgba(212,168,83,0.45); }
    .form-input::placeholder { color: rgba(232,227,216,0.2); }

    /* ── BUTTONS ── */
    .btn {
      background: #D4A853;
      color: #0D1117;
      border: none;
      border-radius: 4px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      padding: 13px 28px;
      cursor: pointer;
      text-transform: uppercase;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    .btn-ghost {
      background: transparent;
      color: rgba(232,227,216,0.5);
      border: 1px solid rgba(232,227,216,0.12);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.04); opacity: 1; color: #E8E3D8; }
    .btn-back {
      background: transparent;
      color: rgba(232,227,216,0.35);
      border: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.05em;
      cursor: pointer;
      padding: 8px 0;
      margin-bottom: 20px;
      transition: color 0.15s;
    }
    .btn-back:hover { color: rgba(232,227,216,0.6); }
    .btn-copy {
      background: transparent;
      color: rgba(232,227,216,0.5);
      border: 1px solid rgba(232,227,216,0.12);
    }
    .btn-copy:hover { background: rgba(255,255,255,0.04); opacity: 1; color: #E8E3D8; }
    .btn-copy.copied { color: #5CB88A; border-color: rgba(92,184,138,0.3); }
    .actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

    /* ── PROGRESS ── */
    .progress-track {
      display: flex;
      gap: 5px;
      margin-bottom: 40px;
    }
    .progress-seg {
      height: 3px;
      flex: 1;
      border-radius: 2px;
      background: rgba(232,227,216,0.08);
      transition: background 0.3s;
    }
    .progress-seg.active { background: #D4A853; }
    .progress-seg.done { background: rgba(212,168,83,0.35); }

    .focus-badge {
      display: inline-block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #D4A853;
      border: 1px solid rgba(212,168,83,0.25);
      border-radius: 20px;
      padding: 4px 12px;
      margin-bottom: 18px;
    }

    /* ── QUESTIONS ── */
    .q-text {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      line-height: 1.35;
      font-weight: 400;
      color: #E8E3D8;
      margin-bottom: 10px;
    }
    .q-hint {
      font-size: 13px;
      color: rgba(232,227,216,0.38);
      font-style: italic;
      margin-bottom: 28px;
    }
    .q-counter {
      font-size: 12px;
      color: rgba(232,227,216,0.28);
      align-self: center;
    }
    .volume-prefill {
      background: rgba(212,168,83,0.05);
      border: 1px solid rgba(212,168,83,0.18);
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 18px;
      font-size: 13px;
      color: rgba(232,227,216,0.6);
    }
    .volume-prefill strong { color: #D4A853; font-family: 'IBM Plex Mono', monospace; font-weight: 500; }

    /* ── ASSUMPTION CERTAINTY ── */
    .assumption-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 32px;
    }
    .assumption-card {
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(232,227,216,0.07);
      border-radius: 8px;
      padding: 20px 24px;
    }
    .assumption-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(212,168,83,0.6);
      margin-bottom: 8px;
    }
    .assumption-text {
      font-size: 14px;
      color: rgba(232,227,216,0.62);
      line-height: 1.6;
      margin-bottom: 14px;
    }
    .assumption-values {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: rgba(232,227,216,0.45);
      margin-bottom: 14px;
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }
    .assumption-values span strong {
      color: #E8E3D8;
      font-weight: 500;
      margin-left: 6px;
    }
    .assumption-note {
      font-size: 12px;
      color: rgba(232,227,216,0.35);
      font-style: italic;
      margin-bottom: 14px;
    }
    .certainty-pills {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .certainty-pills-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(232,227,216,0.35);
      margin-right: 6px;
    }
    .certainty-pill {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 6px 12px;
      border-radius: 4px;
      border: 1px solid rgba(232,227,216,0.1);
      background: transparent;
      color: rgba(232,227,216,0.35);
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
    }
    .certainty-pill:hover {
      border-color: rgba(212,168,83,0.3);
      color: rgba(232,227,216,0.6);
    }
    .certainty-pill.selected {
      background: #D4A853;
      border-color: #D4A853;
      color: #0D1117;
    }

    /* ── STRUCTURED COST GRID ── */
    .grid-card {
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(232,227,216,0.07);
      border-radius: 8px;
      padding: 22px 24px;
      margin-bottom: 14px;
    }
    .grid-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .grid-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(212,168,83,0.75);
    }
    .grid-prompt {
      font-size: 13px;
      color: rgba(232,227,216,0.5);
      line-height: 1.55;
      margin-bottom: 14px;
    }
    .entry-toggle {
      display: inline-flex;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(232,227,216,0.1);
      border-radius: 4px;
      overflow: hidden;
    }
    .entry-toggle button {
      background: transparent;
      border: none;
      padding: 5px 11px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(232,227,216,0.4);
      cursor: pointer;
      transition: all 0.15s;
    }
    .entry-toggle button.active {
      background: #D4A853;
      color: #0D1117;
    }
    .grid-row {
      display: grid;
      grid-template-columns: 50px 1fr 1fr 1fr;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
    }
    .grid-row-head {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(232,227,216,0.35);
      text-align: right;
    }
    .grid-input {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(232,227,216,0.1);
      border-radius: 4px;
      color: #E8E3D8;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      padding: 8px 10px;
      outline: none;
      width: 100%;
      transition: border-color 0.15s;
    }
    .grid-input:focus { border-color: rgba(212,168,83,0.45); }
    .grid-preview {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: rgba(232,227,216,0.35);
      margin-top: 6px;
      padding-left: 60px;
    }
    .growth-field {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px dashed rgba(232,227,216,0.08);
    }
    .growth-field-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(232,227,216,0.35);
      margin-bottom: 6px;
    }
    .growth-field textarea {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(232,227,216,0.08);
      border-radius: 4px;
      color: rgba(232,227,216,0.75);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      padding: 8px 10px;
      outline: none;
      resize: vertical;
    }
    .growth-field textarea:focus { border-color: rgba(212,168,83,0.3); }
    .implied-toggle {
      margin-top: 12px;
      font-size: 12px;
      color: rgba(232,227,216,0.5);
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .implied-toggle input { accent-color: #D4A853; }
    .grid-legend {
      background: rgba(212,168,83,0.05);
      border: 1px solid rgba(212,168,83,0.18);
      border-radius: 6px;
      padding: 14px 18px;
      margin-bottom: 22px;
      font-size: 13px;
      color: rgba(232,227,216,0.6);
      line-height: 1.6;
    }
    .grid-legend strong { color: #D4A853; font-weight: 500; }
    .inline-cert-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(232,227,216,0.06);
      gap: 10px;
      flex-wrap: wrap;
    }

    /* ── LIVE BRIEF / STALE BADGE ── */
    .stale-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(212,168,83,0.12);
      border: 1px solid rgba(212,168,83,0.45);
      color: #D4A853;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 8px 14px;
      border-radius: 4px;
    }
    .stale-badge::before {
      content: "";
      width: 6px; height: 6px;
      background: #D4A853;
      border-radius: 50%;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
    .brief-edit-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    /* ── LOADING ── */
    .loading-wrap {
      padding: 100px 0;
      text-align: center;
    }
    .spinner {
      width: 38px; height: 38px;
      border: 2px solid rgba(212,168,83,0.12);
      border-top-color: #D4A853;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(212,168,83,0.55);
    }

    /* ── CONCEPT REFERENCE ── */
    .concept-ref {
      font-size: 13px;
      color: rgba(232,227,216,0.35);
      font-style: italic;
      line-height: 1.6;
      padding: 14px 18px;
      border-left: 2px solid rgba(212,168,83,0.2);
      margin-bottom: 28px;
    }
    .concept-ref-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(212,168,83,0.4);
      font-style: normal;
      margin-bottom: 4px;
    }

    /* ── UPSTREAM SUMMARY CARD ── */
    .upstream-summary {
      background: rgba(92,184,138,0.04);
      border: 1px solid rgba(92,184,138,0.2);
      border-radius: 8px;
      padding: 20px 24px;
      margin-bottom: 24px;
    }
    .upstream-summary-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(92,184,138,0.7);
      margin-bottom: 10px;
    }
    .upstream-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 5px 0;
      border-bottom: 1px solid rgba(92,184,138,0.08);
      color: rgba(232,227,216,0.55);
    }
    .upstream-row:last-child { border-bottom: none; }
    .upstream-row strong {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 500;
      color: #E8E3D8;
    }

    /* ── MODEL TABLE ── */
    .model-table-wrap {
      overflow-x: auto;
      margin-bottom: 8px;
    }
    .model-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
    }
    .model-table th {
      text-align: right;
      padding: 12px 14px;
      font-weight: 500;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(212,168,83,0.7);
      border-bottom: 1px solid rgba(212,168,83,0.25);
    }
    .model-table th:first-child { text-align: left; width: 45%; }
    .model-table td {
      padding: 12px 14px;
      text-align: right;
      color: rgba(232,227,216,0.75);
      border-bottom: 1px solid rgba(232,227,216,0.04);
    }
    .model-table td:first-child {
      text-align: left;
      font-family: 'Inter', sans-serif;
      color: rgba(232,227,216,0.55);
      font-size: 14px;
    }
    .model-table tr.model-sub td:first-child {
      padding-left: 26px;
      color: rgba(232,227,216,0.4);
      font-style: italic;
    }
    .model-table tr.model-subtotal td {
      color: #E8E3D8;
      font-weight: 600;
      background: rgba(255,255,255,0.02);
    }
    .model-table tr.model-subtotal td:first-child { color: #E8E3D8; font-style: normal; }
    .model-table tr.model-total td {
      border-top: 2px solid rgba(212,168,83,0.45);
      border-bottom: none;
      font-weight: 600;
      color: #E8E3D8;
      padding-top: 18px;
      padding-bottom: 18px;
      background: rgba(212,168,83,0.04);
    }
    .model-table tr.model-total td:first-child { color: #D4A853; }
    .model-table td.neg { color: #E07558; }
    .model-table td.pos { color: #5CB88A; }

    /* ── BRIEF ── */
    .brief-header { margin-bottom: 40px; }
    .brief-title {
      font-family: 'Playfair Display', serif;
      font-size: 34px;
      font-weight: 400;
      color: #E8E3D8;
      margin-bottom: 4px;
    }
    .brief-meta {
      font-size: 13px;
      color: rgba(232,227,216,0.35);
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: 0.05em;
    }
    .brief-section { margin-bottom: 40px; }
    .brief-section-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(212,168,83,0.6);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(232,227,216,0.06);
    }
    .brief-card {
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(232,227,216,0.07);
      border-radius: 8px;
      padding: 28px;
      margin-bottom: 16px;
    }
    .brief-text {
      font-size: 14px;
      color: rgba(232,227,216,0.62);
      line-height: 1.85;
      white-space: pre-wrap;
    }
    .brief-sub {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(212,168,83,0.55);
      margin-bottom: 8px;
      margin-top: 20px;
    }
    .brief-sub:first-child { margin-top: 0; }

    /* ── LEDGER ── */
    .ledger-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 11px 0;
      border-bottom: 1px solid rgba(232,227,216,0.04);
      gap: 16px;
    }
    .ledger-item:last-child { border-bottom: none; }
    .ledger-text {
      font-size: 13px;
      color: rgba(232,227,216,0.55);
      flex: 1;
    }
    .ledger-text strong {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(232,227,216,0.35);
      font-weight: 500;
      display: block;
      margin-bottom: 3px;
    }
    .ledger-cert {

<body>
  <div id="app"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

  <script>
    // ═══════════════════════════════════════
    // CONFIG
    // ═══════════════════════════════════════
    var API_PROXY_URL = "https://endure-proxy.ekiaer.workers.dev";
    var e = React.createElement;
    var useState = React.useState;

    var STEP_LABELS = ["Setup", "Upstream", "Fixed Costs", "Variable & Growth", "Brief"];

    // ═══════════════════════════════════════
    // DEFAULT ASSUMPTION SHAPES
    // ═══════════════════════════════════════
    // Default fixed-cost line items. `entry_mode` controls how the input is displayed
    // (monthly × 12 vs annual). Values (y1/y2/y3) are always stored as annual dollars internally.
    var DEFAULT_FIXED = [
      {
        id: "workspace",
        label: "Workspace",
        prompt: "Rent, coworking, shared studio, mailbox — anywhere you work that costs money. Include your home-office cost if you pay one (utilities, internet allocation, a corner of the rent).",
        entry_mode: "monthly",

        growth_rationale: "",
